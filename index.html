<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --bg:#f5f4f0; --bg2:#ffffff; --bg3:#efefea; --bg4:#e8e6e0;
  --text:#1a1a1a; --text2:#666; --text3:#999;
  --border:rgba(0,0,0,0.1); --border2:rgba(0,0,0,0.18);
  --amber:#D4820A; --amber-bg:#FDF3E0; --amber-light:#F5A623;
  --dark:#1C1A17; --dark2:#252218; --dark3:#2e2b22;
  --cream:#F5EDD8;
  --green:#1D9E75; --red:#E24B4A;
  --r:8px; --r2:12px;
  --tab-h:56px; --header-h:54px;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px;overflow:hidden;}

/* ── 헤더 ── */
#hdr{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:var(--dark);display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:100;}
#hdr-left h1{font-size:15px;font-weight:500;color:var(--cream);}
#hdr-left .sub{font-size:11px;color:#666;margin-top:1px;}
#hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
#today-badge{font-size:12px;color:var(--amber-light);background:rgba(245,166,35,0.15);padding:3px 10px;border-radius:20px;}
#pending-badge{font-size:11px;color:var(--amber-light);display:none;}
#conn-status{font-size:11px;color:#666;cursor:pointer;}

/* ── 탭바 ── */
#tabbar{position:fixed;bottom:0;left:0;right:0;height:var(--tab-h);background:var(--dark2);border-top:1px solid #333;display:flex;z-index:100;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:#666;font-size:10px;border:none;background:none;font-family:inherit;transition:color .2s;}
.tab svg{width:20px;height:20px;}
.tab.active{color:var(--amber-light);}

/* ── 페이지 ── */
.page{position:fixed;top:var(--header-h);left:0;right:0;bottom:var(--tab-h);overflow-y:auto;overflow-x:hidden;display:none;-webkit-overflow-scrolling:touch;}
.page.active{display:block;}

/* ── 공통 ── */
.section{padding:12px 14px;}
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r2);overflow:hidden;}
.card+.card{margin-top:8px;}
.sec-hdr{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;padding:12px 14px 6px;}
.divider{height:0.5px;background:var(--border);margin:0 14px;}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:0 14px;height:36px;border-radius:var(--r);font-size:13px;font-weight:500;font-family:inherit;border:none;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-dark{background:var(--dark);color:var(--cream);}
.btn-dark:active{background:var(--dark3);}
.btn-amber{background:var(--amber-light);color:var(--dark);}
.btn-amber:active{opacity:.85;}
.btn-ghost{background:transparent;color:var(--text2);border:0.5px solid var(--border2);}
.btn-ghost:active{background:var(--bg3);}
.btn-danger{background:transparent;color:var(--red);border:0.5px solid rgba(226,75,74,.4);}
.btn-sm{height:28px;padding:0 10px;font-size:12px;border-radius:6px;}
.btn-xs{height:24px;padding:0 8px;font-size:11px;border-radius:5px;}

input,select,textarea{background:var(--bg2);border:0.5px solid var(--border2);color:var(--text);font-family:inherit;font-size:14px;border-radius:var(--r);padding:9px 11px;outline:none;width:100%;transition:border-color .15s;}
input:focus,select:focus{border-color:var(--amber);}
select option{background:var(--bg2);}
label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;}

.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-amber{background:var(--amber-bg);color:var(--amber);}
.badge-green{background:rgba(29,158,117,.12);color:var(--green);}
.badge-gray{background:var(--bg3);color:var(--text2);}
.badge-red{background:rgba(226,75,74,.1);color:var(--red);}

.mono{font-family:'JetBrains Mono',monospace;}
.fw5{font-weight:500;}
.fw7{font-weight:700;}
.text2{color:var(--text2);}
.text3{color:var(--text3);}
.text-xs{font-size:11px;}
.text-sm{font-size:12px;}
.flex{display:flex;}
.items-center{align-items:center;}
.gap4{gap:4px;}
.gap8{gap:8px;}
.gap12{gap:12px;}
.mt4{margin-top:4px;}
.mt8{margin-top:8px;}
.mt12{margin-top:12px;}
.ml-auto{margin-left:auto;}
.w-full{width:100%;}

/* ── 발주입력 ── */
.cat-scroll{display:flex;gap:6px;flex-wrap:wrap;padding:10px 14px;}
.cat-more-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;background:var(--amber-bg);color:var(--amber);border:0.5px solid var(--amber);font-family:inherit;}
.cat-dropdown{position:relative;flex-shrink:0;}
.cat-dropdown-menu{position:absolute;top:calc(100% + 4px);left:0;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--r2);z-index:200;min-width:120px;box-shadow:0 4px 16px rgba(0,0,0,.15);display:none;}
.cat-dropdown-menu.open{display:block;}
.cat-dropdown-item{padding:10px 14px;font-size:13px;cursor:pointer;color:var(--text2);border-bottom:0.5px solid var(--border);}
.cat-dropdown-item:last-child{border-bottom:none;}
.cat-dropdown-item.active{color:var(--amber);font-weight:700;}
.cat-dropdown-item:active{background:var(--bg3);}
.cat-chip{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;background:var(--bg2);color:var(--text2);border:0.5px solid var(--border2);transition:all .15s;}
.cat-chip.active{background:var(--dark);color:var(--cream);border-color:var(--dark);}

.item-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r2);margin:0 14px 8px;overflow:hidden;}
.item-row{display:flex;align-items:center;padding:11px 12px;border-bottom:0.5px solid var(--border);gap:10px;}
.item-row:last-child{border-bottom:none;}
.item-row.has-qty{background:var(--amber-bg);}
.item-row.is-refund{background:rgba(29,158,117,.05);}
.item-info{flex:1;min-width:0;}
.item-name{font-size:14px;font-weight:500;color:var(--text);}
.item-meta{display:flex;align-items:center;gap:6px;margin-top:2px;}
.item-price{font-size:12px;color:var(--text2);cursor:pointer;border-bottom:1px dashed var(--border2);}
.item-price.negative{color:var(--green);}

.qty-ctrl{display:flex;align-items:center;gap:0;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--r);overflow:hidden;flex-shrink:0;}
.qbtn{width:34px;height:34px;background:none;border:none;font-size:18px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;}
.qbtn:active{background:var(--bg4);}
.qnum{min-width:34px;text-align:center;font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--text);cursor:pointer;padding:0 2px;}
.qnum.has-val{color:var(--amber);}
.qnum.negative-val{color:var(--green);}

#order-bottom{padding:12px 14px;background:var(--bg2);border-top:0.5px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;position:sticky;bottom:0;}

/* ── 발주내역 ── */
.order-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r2);margin:0 14px 8px;overflow:hidden;}
.date-group{margin:0 14px 10px;}
.date-group-hdr{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--dark);border-radius:var(--r2);cursor:pointer;margin-bottom:4px;}
.date-group-hdr.open{border-radius:var(--r2) var(--r2) 0 0;margin-bottom:0;}
.date-group-body{display:none;border:0.5px solid var(--border);border-top:none;border-radius:0 0 var(--r2) var(--r2);overflow:hidden;}
.date-group-body.open{display:block;}
.order-card2{background:var(--bg2);border-bottom:0.5px solid var(--border);overflow:hidden;}
.order-card2:last-child{border-bottom:none;}
.order-hdr{display:flex;align-items:center;gap:8px;padding:11px 12px;cursor:pointer;}
.date-group{margin:0 14px 10px;}
.date-group-hdr{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--dark);border-radius:var(--r2);cursor:pointer;}
.date-group-hdr.open{border-radius:var(--r2) var(--r2) 0 0;}
.date-group-body{display:none;border:0.5px solid var(--border);border-top:none;border-radius:0 0 var(--r2) var(--r2);overflow:hidden;}
.date-group-body.open{display:block;}
.order-card2{background:var(--bg2);border-bottom:0.5px solid var(--border);overflow:hidden;}
.order-card2:last-child{border-bottom:none;}
.date-group{margin:0 14px 10px;}
.date-group-hdr{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--dark);border-radius:var(--r2);cursor:pointer;margin-bottom:0;}
.date-group-hdr.open{border-radius:var(--r2) var(--r2) 0 0;}
.date-group-body{display:none;border:0.5px solid var(--border);border-top:none;border-radius:0 0 var(--r2) var(--r2);overflow:hidden;}
.date-group-body.open{display:block;}
.order-card2{background:var(--bg2);border-bottom:0.5px solid var(--border);overflow:hidden;}
.order-card2:last-child{border-bottom:none;}
.order-body{display:none;border-top:0.5px solid var(--border);}
.order-body.open{display:block;}
.order-item{display:flex;align-items:center;padding:9px 12px;border-bottom:0.5px solid var(--border);gap:8px;font-size:13px;}
.order-item:last-child{border-bottom:none;}
.chk-btn{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.chk-btn.checked{background:var(--green);border-color:var(--green);}

/* ── 통계 ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 14px 8px;}
.stat-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r2);padding:14px 12px;}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:6px;}
.stat-val{font-size:18px;font-weight:500;}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px;}

.bar-wrap{background:var(--bg3);border-radius:4px;height:22px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;background:var(--dark);display:flex;align-items:center;justify-content:flex-end;padding-right:6px;transition:width .5s ease;}
.bar-fill.accent{background:var(--amber-light);}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.bar-label{font-size:12px;color:var(--text2);width:52px;text-align:right;flex-shrink:0;}
.bar-text{font-size:11px;color:var(--cream);white-space:nowrap;}

/* ── 가격변동 ── */
.price-item{padding:11px 12px;border-bottom:0.5px solid var(--border);}
.price-item:last-child{border-bottom:none;}
.price-hist-scroll{display:flex;gap:5px;overflow-x:auto;margin-top:6px;scrollbar-width:none;padding-bottom:2px;}
.price-hist-scroll::-webkit-scrollbar{display:none;}
.price-dot{flex-shrink:0;font-size:10px;padding:3px 7px;background:var(--bg3);border-radius:5px;font-family:'JetBrains Mono',monospace;color:var(--text2);white-space:nowrap;}
.price-dot.latest{color:var(--amber);background:var(--amber-bg);}

/* ── 숫자패드 ── */
#np-overlay{position:fixed;inset:0;z-index:400;display:none;flex-direction:column;justify-content:flex-end;background:rgba(0,0,0,.55);}
#np-overlay.open{display:flex;}
#np-box{background:var(--bg2);border-radius:20px 20px 0 0;padding:16px 14px 24px;border-top:0.5px solid var(--border2);}
#np-title{font-size:13px;color:var(--text2);text-align:center;margin-bottom:6px;}
#np-display{text-align:center;font-size:32px;font-weight:500;font-family:'JetBrains Mono',monospace;padding:10px;color:var(--text);min-height:52px;}
#np-display.negative{color:var(--green);}
#np-unit{text-align:center;font-size:12px;color:var(--text3);margin-bottom:10px;}
.np-quick{display:flex;gap:6px;margin-bottom:12px;}
.np-quick-btn{flex:1;padding:9px 0;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg3);font-size:13px;font-weight:500;color:var(--text);cursor:pointer;text-align:center;}
.np-quick-btn:active{background:var(--bg4);}
.np-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
.np-key{height:60px;border-radius:var(--r2);border:0.5px solid var(--border);background:var(--bg3);font-size:22px;font-weight:500;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;}
.np-key:active{background:var(--bg4);}
.np-key.del{background:var(--bg4);}
.np-key.neg{font-size:14px;background:rgba(29,158,117,.1);color:var(--green);}
.np-confirm{width:100%;height:56px;border-radius:var(--r2);border:none;background:var(--dark);color:var(--cream);font-size:16px;font-weight:500;cursor:pointer;font-family:inherit;}
.np-confirm:active{background:var(--dark3);}

/* ── 모달 ── */
.modal-bg{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.5);display:none;align-items:flex-end;}
.modal-bg.open{display:flex;}
.modal-box{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:20px 16px 32px;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;}
.modal-field{margin-bottom:12px;}
.modal-btns{display:flex;gap:8px;margin-top:16px;}
.modal-btns .btn{flex:1;height:48px;font-size:14px;}

/* 발주확정 공유 시트 */
#share-sheet{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:20px 16px 32px;}

/* ── 필터 ── */
.filter-bar{display:flex;gap:6px;padding:10px 14px;overflow-x:auto;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-chip{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;background:var(--bg2);color:var(--text2);border:0.5px solid var(--border2);transition:all .15s;}
.filter-chip.active{background:var(--dark);color:var(--cream);border-color:var(--dark);}

.date-range{display:flex;gap:6px;padding:0 14px 10px;align-items:center;}
.date-range input[type=date]{flex:1;font-size:12px;}

/* ── 빈상태 ── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;gap:8px;color:var(--text3);}

/* ── 토스트 ── */
#toast{position:fixed;bottom:calc(var(--tab-h)+12px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--dark);color:var(--cream);padding:10px 20px;border-radius:24px;font-size:13px;opacity:0;pointer-events:none;transition:all .25s;z-index:999;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── 카탈로그 관리 ── */
.cat-manage-row{background:var(--bg3);border-radius:var(--r);margin-bottom:8px;padding:10px 12px;}
.cat-items-list{margin-top:8px;}
.cat-item-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--border);font-size:13px;}
.cat-item-row:last-child{border-bottom:none;}

/* ── 입고 확인 체크 ── */
.recv-bar{display:flex;align-items:center;gap:6px;padding:8px 12px;background:var(--bg3);}
.recv-progress{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.recv-progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s;}

/* ── 설정 모달 ── */
.settings-preview{background:var(--bg3);border-radius:var(--r);padding:12px;font-size:12px;color:var(--text2);white-space:pre-wrap;line-height:1.6;margin-bottom:12px;}
</style>
</head>
<body>

<!-- 헤더 -->
<div id="hdr">
  <div id="hdr-left">
    <h1>🍖 식자재 발주관리 <span style="font-size:10px;color:#555;font-weight:400">v1.11</span></h1>
    <div class="sub" id="hdr-date"></div>
  </div>
  <div id="hdr-right">
    <div id="today-badge">오늘 발주 0건</div>
    <div id="pending-badge"></div>
    <div id="conn-status" onclick="manualSync()">☁ 연결중...</div>
  </div>
</div>

<!-- 페이지: 발주입력 -->
<div class="page active" id="page-order">
  <div style="display:flex;align-items:center">
    <div class="cat-scroll" id="cat-scroll" style="flex:1"></div>
    <button class="btn btn-ghost btn-sm" style="flex-shrink:0;margin-right:12px;font-size:11px" onclick="openCatalogModal()">⚙ 품목관리</button>
  </div>
  <div id="item-list" style="padding-bottom:8px"></div>
  <div id="order-bottom">
    <div style="flex:1">
      <div class="text-sm text2">선택 품목</div>
      <div><span id="order-count" class="mono fw7">0</span><span class="text-sm text2">개</span></div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="resetOrder()">초기화</button>
    <button class="btn btn-amber" style="height:40px;font-size:14px" onclick="openConfirmModal()">발주 확정 →</button>
  </div>
</div>

<!-- 페이지: 발주내역 -->
<div class="page" id="page-history">
  <div class="filter-bar" id="hist-filter">
    <div class="filter-chip active" data-days="7" onclick="setHistFilter(this,7)">7일</div>
    <div class="filter-chip" data-days="30" onclick="setHistFilter(this,30)">30일</div>
    <div class="filter-chip" data-days="90" onclick="setHistFilter(this,90)">3개월</div>
    <div class="filter-chip" data-days="0" onclick="setHistFilter(this,0)">전체</div>
  </div>
  <div style="padding:0 14px 8px">
    <input type="text" id="hist-search" placeholder="품목명 검색..." style="font-size:13px" oninput="renderHistory()">
  </div>

<script>
// ══════════════════════════════════════════
// 상태
// ══════════════════════════════════════════
let CATALOG = [];          // Firebase에서 로드
let allOrders = [];        // 발주 목록
let priceHistory = {};     // 가격 이력
let settings = { storeName:'범방동영진돼지국밥', greeting:'안녕하세요', closing:'부탁드립니다\n감사합니다~' };
let catPhones = {};        // {카테고리: 전화번호}

let currentQty = {};       // {id: qty}
let currentPrices = {};    // {id: price}
let currentCat = '전체';
let catOrderList = []; // 카테고리 순서 (Firebase에서 로드)
let histDays = 7;
let statsPeriod = 'month';
let priceMonths = 3;
let fbReady = false;
let npTarget = null;       // {type, id, callback}
let npStr = '';
let npIsNeg = false;
let pendingPriceId = null;
let newItemMeat = false;
let newItemCat = '';
let pastRows = [];

const DEFAULT_CATALOG = [
  {id:'p001',cat:'돼지고기',name:'앞다리살',unit:'kg',isMeat:true,defaultPrice:8500},
  {id:'p002',cat:'돼지고기',name:'뒷다리살',unit:'kg',isMeat:true,defaultPrice:7500},
  {id:'p003',cat:'돼지고기',name:'삼겹살',unit:'kg',isMeat:true,defaultPrice:18000},
  {id:'p004',cat:'돼지고기',name:'돼지머리',unit:'개',isMeat:false,defaultPrice:35000},
  {id:'p005',cat:'돼지고기',name:'내장(소창)',unit:'kg',isMeat:true,defaultPrice:5000},
  {id:'p006',cat:'돼지고기',name:'내장(대창)',unit:'kg',isMeat:true,defaultPrice:4500},
  {id:'p007',cat:'돼지고기',name:'수육용 고기',unit:'kg',isMeat:true,defaultPrice:9000},
  {id:'v001',cat:'채소',name:'대파',unit:'단',isMeat:false,defaultPrice:2000},
  {id:'v002',cat:'채소',name:'양파',unit:'망',isMeat:false,defaultPrice:12000},
  {id:'v003',cat:'채소',name:'마늘',unit:'kg',isMeat:false,defaultPrice:8000},
  {id:'v004',cat:'채소',name:'생강',unit:'kg',isMeat:false,defaultPrice:5000},
  {id:'v005',cat:'채소',name:'무',unit:'개',isMeat:false,defaultPrice:2000},
  {id:'v006',cat:'채소',name:'부추',unit:'단',isMeat:false,defaultPrice:2500},
  {id:'v007',cat:'채소',name:'고추',unit:'kg',isMeat:false,defaultPrice:12000},
  {id:'s001',cat:'양념',name:'된장',unit:'kg',isMeat:false,defaultPrice:4500},
  {id:'s002',cat:'양념',name:'고추가루',unit:'kg',isMeat:false,defaultPrice:15000},
  {id:'s003',cat:'양념',name:'참기름',unit:'L',isMeat:false,defaultPrice:25000},
  {id:'s004',cat:'양념',name:'들기름',unit:'L',isMeat:false,defaultPrice:18000},
  {id:'s005',cat:'양념',name:'소금',unit:'kg',isMeat:false,defaultPrice:1500},
  {id:'s006',cat:'양념',name:'새우젓',unit:'kg',isMeat:false,defaultPrice:12000},
  {id:'d001',cat:'주류',name:'소주(처음처럼)',unit:'박스',isMeat:false,defaultPrice:28000},
  {id:'d002',cat:'주류',name:'소주(참이슬)',unit:'박스',isMeat:false,defaultPrice:28000},
  {id:'d003',cat:'주류',name:'맥주(카스)',unit:'박스',isMeat:false,defaultPrice:35000},
  {id:'d004',cat:'주류',name:'막걸리',unit:'박스',isMeat:false,defaultPrice:24000},
  {id:'d005',cat:'주류',name:'공병환급',unit:'박스',isMeat:false,defaultPrice:-1500},
  {id:'e001',cat:'기타',name:'김치',unit:'kg',isMeat:false,defaultPrice:8000},
  {id:'e002',cat:'기타',name:'계란',unit:'판',isMeat:false,defaultPrice:7000},
  {id:'e003',cat:'기타',name:'두부',unit:'모',isMeat:false,defaultPrice:2000},
  {id:'e004',cat:'기타',name:'당면',unit:'kg',isMeat:false,defaultPrice:5000},
  {id:'e005',cat:'기타',name:'물수건',unit:'박스',isMeat:false,defaultPrice:8000},
];

// ══════════════════════════════════════════
// Firebase
// ══════════════════════════════════════════
function dbRef(path) { return window._fn.ref(window._db, path); }

window.addEventListener('fb-ready', () => {
  fbReady = true;
  setConnStatus('☁ 동기화됨', '#1D9E75');
  loadAll();
});

function setConnStatus(msg, color) {
  const el = document.getElementById('conn-status');
  if (el) { el.textContent = msg; el.style.color = color || '#666'; }
}

async function manualSync() {
  setConnStatus('⟳ 동기화중...', '#F5A623');
  // Firebase onValue는 실시간이라 그냥 상태만 갱신
  setTimeout(() => setConnStatus('☁ 동기화됨', '#1D9E75'), 1000);
}

function loadAll() {
  const { onValue } = window._fn;

  // 설정
  onValue(dbRef('settings'), snap => {
    const v = snap.val();
    if (v) { settings = { ...settings, ...v }; }
  });

  // 카테고리별 전화번호
  onValue(dbRef('catPhones'), snap => {
    const raw = snap.val() || {};
    catPhones = {};
    const migrateKeys = []; // 인코딩된 키 마이그레이션 목록
    Object.entries(raw).forEach(([k, v]) => {
      let decoded = k;
      try { decoded = decodeURIComponent(k); } catch {}
      catPhones[decoded] = v;
      // 키가 인코딩된 형태면 마이그레이션 필요
      if (decoded !== k) migrateKeys.push({ oldKey: k, newKey: decoded, val: v });
    });
    // 인코딩된 키를 한글 키로 자동 변환
    if (migrateKeys.length > 0 && fbReady) {
      migrateKeys.forEach(({ oldKey, newKey, val }) => {
        window._fn.set(dbRef('catPhones/' + newKey), val).then(() => {
          window._fn.remove(dbRef('catPhones/' + oldKey));
        }).catch(() => {});
      });
    }
  });

  // 카테고리 순서
  onValue(dbRef('catOrder'), snap => {
    catOrderList = snap.val() || [];
    renderCats();
    renderItemList();
  });

  // 카탈로그
  onValue(dbRef('catalog'), snap => {
    const data = snap.val();
    if (data && Object.keys(data).length > 0) {
      CATALOG = Object.entries(data).map(([id, v]) => ({ id, ...v }));
      const catOrder = [...new Set(DEFAULT_CATALOG.map(i => i.cat))];
      CATALOG.sort((a, b) => {
        const ai = catOrder.indexOf(a.cat), bi = catOrder.indexOf(b.cat);
        if (ai !== bi) return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
        return 0;
      });
    } else {
      CATALOG = [...DEFAULT_CATALOG];
      // 최초 저장
      DEFAULT_CATALOG.forEach(item => {
        const { id, ...d } = item;
        window._fn.set(dbRef('catalog/' + id), d).catch(() => {});
      });
    }
    CATALOG.forEach(item => {
      if (!currentPrices[item.id]) currentPrices[item.id] = item.defaultPrice;
    });
    renderCats();
    renderItemList();
  });

  // 발주 내역 - orders 전체 구독 (구버전/신버전 모두 처리)
  const now = new Date();

  onValue(dbRef('orders'), snap => {
    allOrders = [];
    snap.forEach(child => {
      const val = child.val();
      if (!val) return;
      // 구버전: createdAt이 바로 있는 경우
      if (val.createdAt) {
        allOrders.push({ key: child.key, month: monthKey(val.createdAt), ...val });
      }
      // 신버전: 월별 노드 안에 발주들이 있는 경우 (예: 2026-04)
      else if (typeof val === 'object') {
        Object.entries(val).forEach(([subKey, subVal]) => {
          if (subVal && subVal.createdAt) {
            allOrders.push({ key: subKey, month: child.key, ...subVal });
          }
        });
      }
    });
    allOrders.sort((a, b) => b.createdAt - a.createdAt);
    updateHeader();
    if (document.getElementById('page-history').classList.contains('active')) renderHistory();
    if (document.getElementById('page-stats').classList.contains('active')) renderStats();
  });

  // 가격 이력
  onValue(dbRef('priceHistory'), snap => {
    priceHistory = snap.val() || {};
    CATALOG.forEach(item => {
      const hist = priceHistory[item.id];
      if (hist) {
        const keys = Object.keys(hist);
        const latest = hist[keys[keys.length - 1]];
        if (latest) currentPrices[item.id] = latest.price;
      }
    });
    renderItemList();
    if (document.getElementById('page-price').classList.contains('active')) renderPriceChange();
  });
}

// ══════════════════════════════════════════
// 유틸
// ══════════════════════════════════════════
const commas = n => (n || 0).toLocaleString('ko-KR');
const pad = n => String(n).padStart(2, '0');
const monthKey = ts => { const d = new Date(ts || Date.now()); return `${d.getFullYear()}-${pad(d.getMonth() + 1)}`; };
const toDateStr = ts => { const d = new Date(ts); return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`; };
const fmtDT = ts => { const d = new Date(ts); return `${d.getMonth() + 1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}`; };
const escHtml = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

function updateHeader() {
  const now = new Date();
  document.getElementById('hdr-date').textContent = `${now.getFullYear()}.${pad(now.getMonth() + 1)}.${pad(now.getDate())} (${['일','월','화','수','목','금','토'][now.getDay()]})`;
  const todayCnt = allOrders.filter(o => toDateStr(o.createdAt) === toDateStr(Date.now())).length;
  document.getElementById('today-badge').textContent = todayCnt > 0 ? `오늘 발주 ${todayCnt}건` : '오늘 발주 0건';
  const pending = allOrders.filter(o => o.items && o.items.some(i => !i.received)).length;
  const pb = document.getElementById('pending-badge');
  if (pending > 0) { pb.textContent = `입고대기 ${pending}건`; pb.style.display = 'block'; }
  else pb.style.display = 'none';
  const histLabel = document.getElementById('tab-hist-label');
  if (histLabel) histLabel.textContent = pending > 0 ? `발주내역 ${pending}` : '발주내역';
}

function switchTab(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'stats') renderStats();
  if (name === 'price') renderPriceChange();
}

// 발주입력 탭

function getCats() { return ['전체', ...new Set(CATALOG.map(i => i.cat))]; }

const MAX_VISIBLE_CATS = 6; // 2줄에 보여줄 최대 개수

function renderCats() {
  const el = document.getElementById('cat-scroll');
  const cats = getCats();
  const visible = cats.slice(0, MAX_VISIBLE_CATS);
  const overflow = cats.slice(MAX_VISIBLE_CATS);
  const activeInOverflow = overflow.includes(currentCat);

  let html = visible.map(c =>
    `<div class="cat-chip ${c === currentCat ? 'active' : ''}" onclick="setCat('${c}')">${c}</div>`
  ).join('');

  if (overflow.length > 0) {
    html += `<div class="cat-dropdown" id="cat-dropdown">
      <button class="cat-more-btn ${activeInOverflow ? 'active' : ''}" onclick="toggleCatDropdown(event)">
        ${activeInOverflow ? currentCat : '더보기'} ▾
      </button>
      <div class="cat-dropdown-menu" id="cat-dropdown-menu">
        ${overflow.map(c => `<div class="cat-dropdown-item ${c === currentCat ? 'active' : ''}" onclick="setCatFromDropdown('${c}')">${c}</div>`).join('')}
      </div>
    </div>`;
  }
  el.innerHTML = html;
}

function toggleCatDropdown(e) {
  e.stopPropagation();
  const menu = document.getElementById('cat-dropdown-menu');
  if (menu) menu.classList.toggle('open');
}

function setCatFromDropdown(c) {
  const menu = document.getElementById('cat-dropdown-menu');
  if (menu) menu.classList.remove('open');
  setCat(c);
}

// input 클릭 시 숫자패드
document.addEventListener('click', function(e) {
  const inp = e.target.closest('input[data-nptype]');
  if (inp) {
    const nptype = inp.dataset.nptype;
    const sid = inp.dataset.sid;
    const unit = inp.dataset.unit;
    const val = parseFloat(inp.dataset.val) || parseFloat(inp.value) || 0;
    const name = inp.dataset.name || '';
    const inputId = (nptype === 'receiveQty' ? 'rqty-' : 'rprice-') + sid;
    openNpReceive(inputId, nptype, name + (nptype === 'receiveQty' ? ' 수량' : ' 단가'), unit, val);
  }
});

// 외부 클릭시 드롭다운 닫기
document.addEventListener('click', () => {
  const menu = document.getElementById('cat-dropdown-menu');
  if (menu) menu.classList.remove('open');
});

function setCat(c) { currentCat = c; renderCats(); renderItemList(); }

function renderItemList() {
  const items = currentCat === '전체' ? CATALOG : CATALOG.filter(i => i.cat === currentCat);
  const el = document.getElementById('item-list');
  if (!items.length) { el.innerHTML = '<div class="empty-state">품목 없음</div>'; return; }

  const byCat = {};
  items.forEach(i => { (byCat[i.cat] = byCat[i.cat] || []).push(i); });

  let html = '';
  Object.entries(byCat).forEach(([cat, catItems]) => {
    if (currentCat === '전체') html += `<div class="sec-hdr">${cat}</div>`;
    html += `<div class="item-card">`;
    catItems.forEach(item => {
      const qty = currentQty[item.id] || 0;
      const price = currentPrices[item.id] !== undefined ? currentPrices[item.id] : item.defaultPrice;
      const isNeg = price < 0;
      const isRefund = isNeg;
      html += `
        <div class="item-row ${qty > 0 ? (isRefund ? 'is-refund' : 'has-qty') : ''}" id="irow-${item.id}">
          <div class="item-info">
            <div class="item-name">${item.name}${isRefund ? ' <span style="font-size:10px;color:var(--green);font-weight:600">환급</span>' : ''}${item.isMeat ? ' <span class="badge badge-amber" style="font-size:9px">육류</span>' : ''}</div>
            <div class="item-meta">
              <span class="text3 text-xs">${item.unit}</span>
              <span class="item-price ${isNeg ? 'negative' : ''}" onclick="openPriceEditModal('${item.id}')">${commas(price)}원</span>
            </div>
          </div>
          <div class="qty-ctrl">
            <button class="qbtn" onclick="changeQty('${item.id}',-1)">−</button>
            <div class="qty-val ${qty > 0 ? (isRefund ? 'negative-val' : 'has-val') : ''} qnum" onclick="openNpQty('${item.id}')">${qty > 0 ? qty : '-'}</div>
            <button class="qbtn" onclick="changeQty('${item.id}',1)">+</button>
          </div>
        </div>`;
    });
    html += `</div>`;
  });
  el.innerHTML = html;
  updateOrderCount();
}

function changeQty(id, delta) {
  const item = CATALOG.find(i => i.id === id);
  const step = item && item.isMeat ? 0.5 : 1;
  let cur = currentQty[id] || 0;
  cur = Math.max(0, +(cur + delta * step).toFixed(1));
  currentQty[id] = cur;
  updateItemRow(id);
  updateOrderCount();
}

function updateItemRow(id) {
  const qty = currentQty[id] || 0;
  const qv = document.querySelector(`#irow-${id} .qnum`);
  if (!qv) return;
  const item = CATALOG.find(i => i.id === id);
  const price = currentPrices[id] !== undefined ? currentPrices[id] : (item?.defaultPrice || 0);
  const isNeg = price < 0;
  qv.textContent = qty > 0 ? qty : '-';
  qv.className = `qty-val ${qty > 0 ? (isNeg ? 'negative-val' : 'has-val') : ''} qnum`;
  const row = document.getElementById('irow-' + id);
  if (row) {
    row.className = `item-row ${qty > 0 ? (isNeg ? 'is-refund' : 'has-qty') : ''}`;
  }
}

function updateOrderCount() {
  const cnt = Object.values(currentQty).filter(v => v > 0).length;
  document.getElementById('order-count').textContent = cnt;
}

function resetOrder() {
  if (!Object.values(currentQty).some(v => v > 0)) return;
  if (!confirm('입력 내용을 초기화할까요?')) return;
  currentQty = {};
  renderItemList();
}

// 발주 확정
// ══════════════════════════════════════════
function openConfirmModal() {
  const items = CATALOG.filter(i => (currentQty[i.id] || 0) > 0);
  if (!items.length) { showToast('발주 품목을 선택하세요'); return; }
  const listEl = document.getElementById('confirm-list');
  let total = 0;
  listEl.innerHTML = items.map(item => {
    const qty = currentQty[item.id];
    const price = currentPrices[item.id] !== undefined ? currentPrices[item.id] : item.defaultPrice;
    const sub = qty * price;
    total += sub;
    const isNeg = price < 0;
    return `<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid var(--border);font-size:13px">
      <span>${item.name}${isNeg ? ' <span style="color:var(--green);font-size:11px">환급</span>' : ''}</span>
      <span class="mono ${isNeg ? 'text-green' : ''}">${qty}${item.unit} = <b style="color:${isNeg ? 'var(--green)' : 'var(--amber)'}">${commas(sub)}원</b></span>
    </div>`;
  }).join('') + `<div style="display:flex;justify-content:space-between;padding:10px 0;font-size:14px;font-weight:700">
    <span>합계</span><span class="mono">${commas(total)}원</span>
  </div>`;
  document.getElementById('confirm-memo').value = '';
  document.getElementById('confirm-date').value = toDateStr(Date.now());
  openModal('confirm-modal');
}

async function submitOrder() {
  const items = CATALOG.filter(i => (currentQty[i.id] || 0) > 0);
  if (!items.length) return;
  const dateVal = document.getElementById('confirm-date').value;
  const memo = document.getElementById('confirm-memo').value.trim();
  const now = dateVal ? new Date(dateVal + 'T' + pad(new Date().getHours()) + ':' + pad(new Date().getMinutes()) + ':00').getTime() : Date.now();
  const ym = monthKey(now);
  const orderData = {
    createdAt: now,
    dateStr: toDateStr(now),
    memo,
    items: items.map(item => ({
      id: item.id, name: item.name, cat: item.cat, unit: item.unit,
      qty: currentQty[item.id],
      price: currentPrices[item.id] !== undefined ? currentPrices[item.id] : item.defaultPrice,
      received: false
    }))
  };
  try {
    const newRef = window._fn.push(dbRef('orders/' + ym));
    await window._fn.set(newRef, orderData);
    // 가격 이력 기록
    for (const item of items) {
      await recordPrice(item.id, currentPrices[item.id] !== undefined ? currentPrices[item.id] : item.defaultPrice, '');
    }
    closeModal('confirm-modal');
    const savedOrder = { key: newRef.key, month: ym, ...orderData };
    currentQty = {};
    renderItemList();
    showToast('발주가 저장되었습니다 ✓');
    openShareModal(savedOrder);
  } catch (e) { showToast('저장 실패: ' + e.message); }
}

function makeOrderText(order) {
  // 카테고리별로 묶기
  const catMap = {};
  (order.items || []).forEach(i => { (catMap[i.cat] = catMap[i.cat] || []).push(i); });
  // 카테고리별 문자 형식으로 합치기
  const parts = Object.entries(catMap).map(([cat, its]) => {
    return `${settings.greeting} ${settings.storeName} 입니다\n` +
      its.map(i => `${i.name} ${i.qty}`).join('\n') +
      '\n' + settings.closing;
  });
  return parts.join('\n\n──────────\n\n');
}

function makeCatSmsText(cat, catItems) {
  const txt = `${settings.greeting} ${settings.storeName} 입니다\n` +
    catItems.map(i => `${i.name} ${i.qty}`).join('\n') + '\n' + settings.closing;
  return txt;
}

      let btns = '';
      if (phone) btns += `<a href="${smsHref}" style="display:flex;justify-content:space-between;align-items:center;width:100%;margin-bottom:6px;padding:13px 16px;border-radius:var(--r2);border:0.5px solid var(--border2);background:var(--dark);text-decoration:none">
        <span style="font-size:14px;font-weight:500;color:var(--cream)">📱 ${cat} 문자</span>
        <span style="font-size:12px;color:var(--amber-light)">${phone}</span>
      </a>`;
      if (url) btns += `<a href="${url}" rel="noopener noreferrer" style="display:flex;justify-content:space-between;align-items:center;width:100%;margin-bottom:6px;padding:13px 16px;border-radius:var(--r2);border:0.5px solid var(--border2);background:var(--bg3);text-decoration:none">
        <span style="font-size:14px;font-weight:500;color:var(--text)">🔗 ${cat} 바로가기</span>
        <span style="font-size:12px;color:var(--amber)" class="mono">열기 →</span>

        <span style="font-size:14px;color:var(--text2)">📦 ${cat}</span>

      return btns;
    }).join('')}
    <button onclick="copyText(${JSON.stringify(fullText)})" style="width:100%;margin-top:4px;padding:13px;border-radius:var(--r2);border:0.5px solid var(--border2);background:var(--bg3);font-size:14px;cursor:pointer;color:var(--text2)">📋 전체 내용 다시 복사</button>
  `;

function copyText(txt) {
  navigator.clipboard.writeText(txt).then(() => showToast('복사되었습니다 ✓'));
}

function setHistFilter(el, days) {
  document.querySelectorAll('#hist-filter .filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  histDays = days;
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('history-list');
  const search = (document.getElementById('hist-search').value || '').toLowerCase();
  const cutoff = histDays > 0 ? Date.now() - histDays * 86400000 : 0;
  let orders = allOrders.filter(o => o.createdAt >= cutoff);
  if (search) orders = orders.filter(o => o.items && o.items.some(i => i.name.toLowerCase().includes(search)));

  if (!orders.length) {
    el.innerHTML = '<div class="empty-state">발주 내역 없음</div>';
    el.innerHTML += `<div style="padding:0 14px 8px"><button class="btn btn-ghost w-full" style="border-style:dashed;height:44px" onclick="openPastOrderModal()">+ 지난 발주 수동 입력</button></div>`;
    return;
  }

  // 날짜별로 그룹핑
  const byDate = {};
  orders.forEach(o => {
    const d = toDateStr(o.createdAt);
    (byDate[d] = byDate[d] || []).push(o);
  });

  el.innerHTML = Object.entries(byDate).map(([date, dayOrders]) => {
    const dayTotal = dayOrders.reduce((s, o) => s + (o.items || []).reduce((ss, i) => ss + i.qty * i.price, 0), 0);
    const groupId = 'dg-' + date.replace(/-/g, '');

    // 그날 모든 발주의 품목을 카테고리별로 합치기
    const catMap = {};
    dayOrders.forEach(order => {
      (order.items || []).forEach(item => {
        if (!catMap[item.cat]) catMap[item.cat] = [];
        // 중복 품목은 수량 합산
        const existing = catMap[item.cat].find(i => i.name === item.name);
        if (existing) {
          existing.qty = +(existing.qty + item.qty).toFixed(2);
          existing.received = existing.received && item.received;
        } else {
          catMap[item.cat].push({
            name: item.name, unit: item.unit, qty: item.qty,
            price: item.price, received: item.received,
            orderKey: order.key, orderMonth: order.month,
            itemIdx: (order.items || []).indexOf(item)
          });
        }
      });
    });

    const totalItems = Object.values(catMap).reduce((s, items) => s + items.length, 0);
    const pendingItems = Object.values(catMap).flat().filter(i => !i.received).length;
    const allRecv = pendingItems === 0 && totalItems > 0;
    const badge = allRecv
      ? '<span class="badge badge-green">입고완료</span>'
      : pendingItems > 0
        ? `<span class="badge badge-gray" style="font-size:10px">대기 ${pendingItems}</span>`
        : '';

    // 카테고리별 품목 목록 (접힌 상태에서 보이는 요약)
    // 그날 전체 품목을 카테고리별 세로 목록으로 표시
    // 그날 전체 품목을 카테고리별 세로 목록으로 표시
    const catSummary = Object.entries(catMap).map(function(catEntry) {
      const cat = catEntry[0];
      const items = catEntry[1];
      const catTotal = items.reduce(function(s, i) {
        const qty = i.actualQty != null ? i.actualQty : i.qty;
        const price = i.actualPrice != null ? i.actualPrice : i.price;
        return s + qty * price;
      }, 0);

      const itemRows = items.map(function(item) {
        const actualQty = item.actualQty != null ? item.actualQty : item.qty;
        const actualPrice = item.actualPrice != null ? item.actualPrice : item.price;
        const rcvd = item.received;
        const sid = safeId(item.orderKey, item.itemIdx);
        const chkStyle = 'width:26px;height:26px;border-radius:50%;border:1.5px solid ' + (rcvd ? 'var(--green)' : 'var(--border2)') + ';background:' + (rcvd ? 'var(--green)' : 'none') + ';cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0';
        return '<div style="padding:8px 12px;border-bottom:0.5px solid var(--border);background:' + (rcvd ? 'var(--bg3)' : 'var(--bg2)') + '">' +
          '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">' +
            '<span style="font-size:13px;font-weight:500;flex:1;' + (rcvd ? 'text-decoration:line-through;color:var(--text3)' : '') + '">' + item.name + '</span>' +
            (rcvd && item.receivedDateStr ? '<span style="font-size:10px;color:var(--green)">' + item.receivedDateStr.slice(5).replace('-','/') + '입고</span>' : '') +
            '<button style="' + chkStyle + '" data-key="' + item.orderKey + '" data-month="' + item.orderMonth + '" data-idx="' + item.itemIdx + '" onclick="toggleInlineReceive(this.dataset.key,this.dataset.month,+this.dataset.idx)">' +
              (rcvd ? '<svg viewBox="0 0 20 20" fill="white" width="12" height="12"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/></svg>' : '') +
            '</button>' +
          '</div>' +
          '<div style="display:flex;align-items:center;gap:5px">' +
            '<span style="font-size:11px;color:var(--text3)">수량</span>' +
            '<input type="number" inputmode="decimal" value="' + actualQty + '" step="0.01" style="width:55px;font-size:13px;padding:5px 4px;text-align:center;border-radius:6px" id="rqty-' + sid + '" readonly style="cursor:pointer" data-nptype="receiveQty" data-sid="" + sid + "" data-unit="" + item.unit + "" data-val="" + actualQty + "" data-name="" + item.name + "">' +
            '<span style="font-size:11px;color:var(--text3)">' + item.unit + '</span>' +
            '<span style="font-size:11px;color:var(--text3);margin-left:4px">단가</span>' +

            '<input type="number" inputmode="numeric" value="' + actualPrice + '" style="flex:1;min-width:55px;font-size:13px;padding:5px 4px;text-align:center;border-radius:6px" id="rprice-' + sid + '" readonly style="cursor:pointer" data-nptype="receivePrice" data-sid="" + sid + "" data-unit="원" data-val="" + actualPrice + "" data-name="" + item.name + "">' +
            '<button style="padding:5px 9px;border-radius:6px;border:0.5px solid var(--border2);background:var(--bg3);font-size:13px;color:var(--amber);cursor:pointer" data-sid="' + sid + '" data-delta="500" onclick="adjustInlinePrice(this.dataset.sid,this.dataset.delta)">+</button>' +
          '</div>' +
        '</div>';

function safeId(key, idx) {
  return (key + '-' + idx).replace(/[^a-zA-Z0-9-_]/g, '_');
}

function adjustInlinePrice(sid, delta) {
  const el = document.getElementById('rprice-' + sid);
  if (!el) { console.log('못찾음: rprice-' + sid); return; }
  el.value = Math.max(0, (parseInt(el.value) || 0) + parseInt(delta));
}

async function toggleInlineReceive(key, month, idx) {
  const order = allOrders.find(o => o.key === key && o.month === month);
  if (!order) return;
  const item = order.items[idx];
  if (!item) return;

  const qtyEl = document.getElementById('rqty-' + safeId(key, idx));
  const priceEl = document.getElementById('rprice-' + safeId(key, idx));
  const qtyVal = parseFloat(qtyEl ? qtyEl.value : item.qty) || item.qty;
  const priceVal = parseInt(priceEl ? priceEl.value : item.price) || item.price;

  const newReceived = !item.received;
  const updates = { received: newReceived };
  if (newReceived) {
    updates.actualQty = qtyVal;
    updates.actualPrice = priceVal;
    updates.receivedAt = Date.now();
    updates.receivedDateStr = toDateStr(Date.now());
  } else {
    updates.actualQty = null;
    updates.actualPrice = null;
    updates.receivedAt = null;
    updates.receivedDateStr = null;
  }

  try {
    await window._fn.update(dbRef('orders/' + month + '/' + key + '/items/' + idx), updates);
    if (newReceived && priceVal !== item.price) {
      await recordPrice(item.id || '', priceVal, '실입고 단가');
      currentPrices[item.id] = priceVal;
    }
    showToast(newReceived ? '입고 완료 ✓' : '입고 취소');
  } catch (e) { showToast('업데이트 실패'); }
}

  const el = document.getElementById('receive-price');

async function confirmReceive() {
  if (!receiveTarget) return;
  const { key, month, idx, item } = receiveTarget;
  const qtyVal = parseFloat(document.getElementById('receive-qty').value);
  const priceVal = parseInt(document.getElementById('receive-price').value);

  if (isNaN(qtyVal) || qtyVal <= 0) { showToast('수량을 입력하세요'); return; }
  if (isNaN(priceVal) || priceVal <= 0) { showToast('단가를 입력하세요'); return; }

  const updates = {
    received: true,
    actualQty: qtyVal,
    actualPrice: priceVal,
    receivedAt: Date.now(),
    receivedDateStr: toDateStr(Date.now())
  };

  try {
    await window._fn.update(dbRef('orders/' + month + '/' + key + '/items/' + idx), updates);
    // 단가가 달라졌으면 가격이력 기록
    if (priceVal !== item.price) {
      await recordPrice(item.id || '', priceVal, '실입고 단가');
      currentPrices[item.id] = priceVal;
    }
    closeModal('receive-modal');
    showToast('입고 완료 ✓');
  } catch (e) { showToast('업데이트 실패'); }
}

function toggleStatsCat(cat) {
  if (statsOpenCats.has(cat)) statsOpenCats.delete(cat);
  else statsOpenCats.add(cat);
  renderStats();
}

function setStatsFilter(el, period) {
  document.querySelectorAll('#stats-filter .filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  statsPeriod = period;
  document.getElementById('stats-date-range').style.display = period === 'custom' ? 'flex' : 'none';
  if (period !== 'custom') renderStats();
}

let statsOpenCats = new Set(); // 펼쳐진 카테고리

function renderStats() {
  const el = document.getElementById('stats-content');
  const now = new Date();
  let from, to;
  if (statsPeriod === 'month') {
    from = new Date(now.getFullYear(), now.getMonth(), 1);
    to = new Date(now.getFullYear(), now.getMonth() + 1, 0);
  } else if (statsPeriod === 'year') {
    from = new Date(now.getFullYear(), 0, 1);
    to = new Date(now.getFullYear(), 11, 31);
  } else {
    from = new Date(document.getElementById('stats-from').value || now);
    to = new Date(document.getElementById('stats-to').value || now);
  }
  const fromTs = from.getTime(), toTs = to.getTime() + 86400000;
  const filtered = allOrders.filter(o => o.createdAt >= fromTs && o.createdAt < toTs);
  let totalAmt = 0;
  const itemMap = {}, catMap = {};
  filtered.forEach(order => {
    (order.items || []).forEach(item => {
      const qty = item.actualQty != null ? item.actualQty : item.qty;
      const price = item.actualPrice != null ? item.actualPrice : item.price;
      const sub = qty * price;
      totalAmt += sub;
      if (!itemMap[item.name]) itemMap[item.name] = { amt: 0, qty: 0, unit: item.unit, cat: item.cat };
      itemMap[item.name].amt += sub;
      itemMap[item.name].qty += qty;
      if (!catMap[item.cat]) catMap[item.cat] = { amt: 0, items: {} };
      catMap[item.cat].amt += sub;
      if (!catMap[item.cat].items[item.name]) catMap[item.cat].items[item.name] = { amt: 0, qty: 0, unit: item.unit };
      catMap[item.cat].items[item.name].amt += sub;
      catMap[item.cat].items[item.name].qty += qty;
    });
  });
  const ranked = Object.entries(itemMap).sort((a, b) => Math.abs(b[1].amt) - Math.abs(a[1].amt));
  const maxAmt = ranked[0] ? Math.abs(ranked[0][1].amt) : 1;
  const months = {};
  filtered.forEach(o => {
    const m = `${new Date(o.createdAt).getMonth() + 1}월`;
    months[m] = (months[m] || 0) + (o.items || []).reduce((s, i) => s + i.qty * i.price, 0);
  });
  const mKeys = Object.keys(months);
  const mMax = Math.max(...Object.values(months).map(Math.abs), 1);

  // 카테고리 섹션 렌더링
  const catSec = document.getElementById('stats-cat-section');
  if (catSec) {
    const catSorted = Object.entries(catMap).sort((a,b) => Math.abs(b[1].amt) - Math.abs(a[1].amt));
    catSec.innerHTML = catSorted.length === 0 ? '<div class="empty-state" style="padding:24px">데이터 없음</div>' :
      catSorted.map(function(catEntry) {
        const cat = catEntry[0], data = catEntry[1];
        const pct = Math.round(Math.abs(data.amt) / Math.max(Math.abs(totalAmt), 1) * 100);
        const isOpen = statsOpenCats.has(cat);
        const itemsSorted = Object.entries(data.items).sort((a,b) => Math.abs(b[1].amt) - Math.abs(a[1].amt));
        const catMaxAmt = Math.max.apply(null, itemsSorted.map(function(e) { return Math.abs(e[1].amt); }).concat([1]));
        return '<div>' +
          '<div style="display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;border-bottom:0.5px solid var(--border)" onclick="toggleStatsCat(' + JSON.stringify(cat) + ')">' +
            '<div style="flex:1">' +
              '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">' +
                '<span style="font-size:13px;font-weight:700;color:var(--amber)">' + cat + '</span>' +
                '<span style="font-size:11px;color:var(--text3)">' + pct + '%</span>' +
              '</div>' +
              '<div class="bar-wrap"><div class="bar-fill accent" style="width:' + pct + '%"></div></div>' +
            '</div>' +
            '<span style="font-size:13px;font-family:monospace;color:var(--text2);white-space:nowrap">' + commas(data.amt) + '원</span>' +
            '<svg viewBox="0 0 20 20" fill="currentColor" style="width:14px;height:14px;color:var(--text3);flex-shrink:0;transition:transform .2s;transform:' + (isOpen ? 'rotate(180deg)' : '') + '">' +
              '<path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"/>' +
            '</svg>' +
          '</div>' +
          (isOpen ? '<div>' + itemsSorted.map(function(iEntry) {
            const name = iEntry[0], idata = iEntry[1];
            const ipct = Math.round(Math.abs(idata.amt) / catMaxAmt * 100);
            const isNeg = idata.amt < 0;
            return '<div style="display:flex;align-items:center;gap:8px;padding:8px 12px 8px 20px;border-bottom:0.5px solid var(--border)">' +
              '<div style="flex:1">' +
                '<div style="font-size:12px;margin-bottom:3px">' + name + ' <span style="font-size:11px;color:var(--text3)">' + idata.qty.toFixed(1) + idata.unit + '</span></div>' +
                '<div class="bar-wrap"><div class="bar-fill" style="width:' + ipct + '%;' + (isNeg ? 'background:var(--green)' : '') + '"></div></div>' +
              '</div>' +
              '<span style="font-size:12px;font-family:monospace;color:' + (isNeg ? 'var(--green)' : 'var(--text2)') + ';white-space:nowrap">' + commas(idata.amt) + '원</span>' +
            '</div>';
          }).join('') + '</div>' : '') +
        '</div>';
      }).join('');
  }

  el.innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">총 발주금액</div><div class="stat-val mono" style="font-size:16px">${commas(totalAmt)}원</div></div>
      <div class="stat-card"><div class="stat-label">발주 횟수</div><div class="stat-val mono">${filtered.length}건</div></div>
    </div>
    ${mKeys.length > 1 ? `
    <div class="sec-hdr">월별 발주</div>
    <div class="card" style="margin:0 14px 8px;padding:12px">
      ${mKeys.map(m => `<div class="bar-row">
        <div class="bar-label">${m}</div>
        <div class="bar-wrap" style="flex:1"><div class="bar-fill ${months[m] === Math.max(...Object.values(months)) ? 'accent' : ''}" style="width:${Math.round(Math.abs(months[m]) / mMax * 100)}%"><span class="bar-text">${months[m] > 0 ? commas(months[m]) + '원' : ''}</span></div></div>
      </div>`).join('')}
    </div>` : ''}
    <div class="sec-hdr">카테고리별</div>
    <div class="card" style="margin:0 14px 8px">
      ${Object.entries(catMap).length === 0 ? '<div class="empty-state" style="padding:24px">데이터 없음</div>' :
        Object.entries(catMap).sort((a,b) => Math.abs(b[1].amt) - Math.abs(a[1].amt)).map(([cat, data]) => {
          const pct = Math.round(Math.abs(data.amt) / Math.max(Math.abs(totalAmt), 1) * 100);
          const isOpen = statsOpenCats.has(cat);
          const itemsSorted = Object.entries(data.items).sort((a,b) => Math.abs(b[1].amt) - Math.abs(a[1].amt));
          const catMaxAmt = Math.max(...itemsSorted.map(([,d]) => Math.abs(d.amt)), 1);
          return '<div>' +
            '<div style="display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;border-bottom:0.5px solid var(--border)" onclick="toggleStatsCat(' + JSON.stringify(cat) + ')">' +
              '<div style="flex:1">' +
                '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">' +
                  '<span style="font-size:13px;font-weight:700;color:var(--amber)">' + cat + '</span>' +
                  '<span style="font-size:11px;color:var(--text3)">' + pct + '%</span>' +
                '</div>' +
                '<div class="bar-wrap"><div class="bar-fill accent" style="width:' + pct + '%"></div></div>' +

function setPriceFilter(el, months) {
  document.querySelectorAll('#price-filter .filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  priceMonths = months;
  renderPriceChange();
}

function renderPriceChange() {
  const el = document.getElementById('price-list');
  const search = (document.getElementById('price-search').value || '').toLowerCase();
  const cutoff = priceMonths > 0 ? Date.now() - priceMonths * 30 * 86400000 : 0;
  const items = CATALOG.filter(i => !search || i.name.toLowerCase().includes(search));
  if (!items.length) { el.innerHTML = '<div class="empty-state">품목 없음</div>'; return; }

  const byCat = {};
  items.forEach(i => { (byCat[i.cat] = byCat[i.cat] || []).push(i); });

  el.innerHTML = Object.entries(byCat).map(([cat, catItems]) => `
    <div class="sec-hdr">${cat}</div>
    <div class="card" style="margin:0 14px 8px">
      ${catItems.map(item => {
        const hist = priceHistory[item.id] ? Object.values(priceHistory[item.id]).filter(h => !cutoff || h.date >= cutoff) : [];
        const latest = hist[hist.length - 1];
        const prev = hist[hist.length - 2];
        let changeEl = '';
        if (latest && prev) {
          const diff = latest.price - prev.price;
          const pct = ((diff / Math.abs(prev.price)) * 100).toFixed(1);
          changeEl = `<span style="font-size:11px;font-family:'JetBrains Mono',monospace;color:${diff > 0 ? 'var(--red)' : 'var(--green)'}">${diff > 0 ? '▲' : '▼'}${commas(Math.abs(diff))}원</span>`;
        }
        const curPrice = latest?.price !== undefined ? latest.price : (currentPrices[item.id] !== undefined ? currentPrices[item.id] : item.defaultPrice);
        return `<div class="price-item">
          <div class="flex items-center gap8">
            <span style="font-size:13px;font-weight:500;flex:1">${item.name}</span>
            <span class="mono fw5" style="color:${curPrice < 0 ? 'var(--green)' : 'var(--text)'}">${commas(curPrice)}원/${item.unit}</span>
            ${changeEl}
            <button class="btn btn-ghost btn-xs" onclick="openPriceEditModal('${item.id}')">수정</button>
          </div>
          <div class="price-hist-scroll">
            ${hist.slice(-10).map((h, i, arr) => `<div class="price-dot ${i === arr.length - 1 ? 'latest' : ''}">${fmtDate(h.date)} ${commas(h.price)}원${h.memo ? ` (${h.memo})` : ''}</div>`).join('')}
            ${hist.length === 0 ? `<span class="text-xs text3">이력 없음 (기본가: ${commas(item.defaultPrice)}원)</span>` : ''}
          </div>
        </div>`;
      }).join('')}
    </div>`).join('');
}

function fmtDate(ts) { const d = new Date(ts); return `${d.getMonth() + 1}/${d.getDate()}`; }

function openPriceEditModal(id) {
  const item = CATALOG.find(i => i.id === id);
  if (!item) return;
  pendingPriceId = id;
  document.getElementById('price-edit-title').textContent = `가격 수정 - ${item.name}`;
  document.getElementById('price-edit-val').value = currentPrices[id] !== undefined ? currentPrices[id] : item.defaultPrice;
  document.getElementById('price-edit-memo').value = '';
  openModal('price-edit-modal');
}

async function savePriceEdit() {
  const id = pendingPriceId;
  if (!id) return;
  const val = parseInt(document.getElementById('price-edit-val').value);
  const memo = document.getElementById('price-edit-memo').value.trim();
  if (isNaN(val)) { showToast('올바른 금액을 입력하세요'); return; }
  currentPrices[id] = val;
  await recordPrice(id, val, memo);
  closeModal('price-edit-modal');
  renderItemList();
  if (document.getElementById('page-price').classList.contains('active')) renderPriceChange();
  showToast('가격 업데이트됨 ✓');
}

async function recordPrice(id, price, memo) {
  if (!id) return;
  // 같은 가격이면 스킵
  const hist = priceHistory[id];
  if (hist) {
    const keys = Object.keys(hist);
    const lastPrice = hist[keys[keys.length - 1]]?.price;
    if (lastPrice === price && !memo) return;
  }
  const entry = { date: Date.now(), price, memo: memo || '' };
  const newRef = window._fn.push(dbRef('priceHistory/' + id));
  await window._fn.set(newRef, entry);
}

        </div>`).join('')}

async function moveCat(idx, dir) {
  const allCats = [...new Set(CATALOG.map(i => i.cat))];
  const cats = catOrderList.length > 0
    ? [...catOrderList.filter(c => allCats.includes(c)), ...allCats.filter(c => !catOrderList.includes(c))]
    : [...allCats];
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= cats.length) return;
  const tmp = cats[idx]; cats[idx] = cats[newIdx]; cats[newIdx] = tmp;
  catOrderList = cats;
  try {
    await window._fn.set(dbRef('catOrder'), cats);
    renderCatalogContent();
    renderCats();
    renderItemList();
  } catch(e) { showToast('저장 실패'); }
}

function escAttr(s) { return s.replace(/'/g, "\\'"); }

async function savePhone(cat) {
  const phoneInp = document.querySelector(`[data-phone-cat="${cat}"]`);
  const urlInp = document.querySelector(`[data-url-cat="${cat}"]`);
  const phone = phoneInp ? phoneInp.value.trim() : '';
  const url = urlInp ? urlInp.value.trim() : '';
  catPhones[cat] = { phone, url };
  try {
    await window._fn.set(dbRef('catPhones/' + cat.replace(/[.$#\[\]/]/g, '_')), { phone, url });
    showToast('저장됨 ✓');
  } catch { showToast('저장 실패'); }
}

async function saveNewItem() {

async function deleteItem(id) {
  const item = CATALOG.find(i => i.id === id);
  if (!item || !confirm(`'${item.name}' 삭제할까요?`)) return;

    showToast('삭제됨');
    renderCatalogContent();
  } catch { showToast('삭제 실패'); }

async function deleteCat(cat) {
  const items = CATALOG.filter(i => i.cat === cat);
  if (!confirm(`'${cat}' 카테고리와 품목 ${items.length}개를 모두 삭제할까요?`)) return;
  try {
    for (const item of items) await window._fn.remove(dbRef('catalog/' + item.id));
    showToast(`${cat} 삭제됨`);
    renderCatalogContent();

async function addCategory() {

  document.getElementById('new-cat-input').value = '';
  newItemCat = name;
  openItemAddModal(name);
}

function openPastOrderModal(key, month) {
  const now = new Date();
  document.getElementById('past-date').value = toDateStr(Date.now());
  document.getElementById('past-time').value = '09:00';

  if (key && month) {
    // 기존 발주 수정
    const order = allOrders.find(o => o.key === key && o.month === month);
    if (order) {
      pastRows = (order.items || []).map(i => ({ ...i }));
      document.getElementById('past-date').value = toDateStr(order.createdAt);
    }
  } else {
    pastRows = CATALOG.map(i => ({ id: i.id, name: i.name, cat: i.cat, unit: i.unit, price: currentPrices[i.id] !== undefined ? currentPrices[i.id] : i.defaultPrice, qty: 0 }));
  }
  renderPastRows();
  openModal('past-order-modal');
}

function renderPastRows() {
  const el = document.getElementById('past-rows');
  el.innerHTML = pastRows.map((r, i) => `
    <div style="display:grid;grid-template-columns:1fr 0.6fr 0.6fr auto;gap:6px;margin-bottom:8px;align-items:center">
      <input value="${r.name}" placeholder="품목명" style="font-size:12px;padding:7px 8px" onchange="pastRows[${i}].name=this.value">
      <input type="number" value="${r.price}" placeholder="단가" style="font-size:12px;padding:7px 8px" onchange="pastRows[${i}].price=parseInt(this.value)||0">
      <input type="number" value="${r.qty||''}" placeholder="수량" style="font-size:12px;padding:7px 8px" onchange="pastRows[${i}].qty=parseFloat(this.value)||0">
      <button class="btn btn-danger btn-xs" onclick="pastRows.splice(${i},1);renderPastRows()">✕</button>
    </div>`).join('');
}

function addPastRow() {
  pastRows.push({ name: '', cat: getCats()[1] || '기타', unit: '개', price: 0, qty: 0 });
  renderPastRows();
}

async function savePastOrder() {
  const dateVal = document.getElementById('past-date').value;
  const timeVal = document.getElementById('past-time').value || '09:00';
  if (!dateVal) { showToast('날짜를 선택하세요'); return; }
  const items = pastRows.filter(r => r.qty > 0 && r.name.trim()).map(r => ({
    id: r.id || '', name: r.name.trim(), cat: r.cat || '기타', unit: r.unit || '개',
    price: r.price, qty: r.qty, received: false
  }));
  if (!items.length) { showToast('수량이 있는 품목이 없어요'); return; }
  const ts = new Date(`${dateVal}T${timeVal}:00`).getTime();
  const ym = monthKey(ts);
  const orderData = { createdAt: ts, dateStr: dateVal, memo: '', items };
  try {
    const newRef = window._fn.push(dbRef('orders/' + ym));
    await window._fn.set(newRef, orderData);
    closeModal('past-order-modal');
    showToast('저장됨 ✓');
  } catch (e) { showToast('저장 실패'); }
}

function openNpQty(id) {
  const item = CATALOG.find(i => i.id === id);
  npTarget = { type: 'qty', id };
  npStr = '';
  npIsNeg = false;
  document.getElementById('np-title').textContent = `${item?.name} 수량 (${item?.unit})`;
  document.getElementById('np-unit').textContent = item?.unit || '';
  document.getElementById('np-neg-btn').style.display = 'none';
  document.getElementById('np-quick').innerHTML = '';
  npUpdateDisplay();
  document.getElementById('np-overlay').classList.add('open');
}

function npClose(e) {
  if (e.target === document.getElementById('np-overlay')) {
    document.getElementById('np-overlay').classList.remove('open');
  }
}

function npKey(c) {
  if (c === '.' && npStr.includes('.')) return;
  if (npStr === '0' && c !== '.') npStr = c;
  else npStr += c;
  npUpdateDisplay();
}

function npBackspace() {
  npStr = npStr.slice(0, -1);
  npUpdateDisplay();
}

function npToggleNeg() {
  npIsNeg = !npIsNeg;
  npUpdateDisplay();
}

function npUpdateDisplay() {
  const val = npStr || '-';
  const disp = document.getElementById('np-display');
  disp.textContent = npIsNeg && npStr ? '-' + val : val;
  disp.className = npIsNeg ? 'negative' : '';
}

function npConfirm() {
  if (!npTarget || !npStr) {
    document.getElementById('np-overlay').classList.remove('open');
    return;
  }
  const val = parseFloat(npStr) * (npIsNeg ? -1 : 1);
  if (isNaN(val)) { showToast('올바른 값 입력'); return; }
  if (npTarget.type === 'qty') {
    currentQty[npTarget.id] = Math.max(0, val);
    updateItemRow(npTarget.id);
    updateOrderCount();
  } else if (npTarget.type === 'receiveQty' || npTarget.type === 'receivePrice') {
    const el = document.getElementById(npTarget.inputId);
    if (el) el.value = val;
  }
  document.getElementById('np-overlay').classList.remove('open');
}

function openNpReceive(inputId, type, title, unit, currentVal) {
  npTarget = { type, inputId };
  npStr = currentVal ? String(Math.abs(currentVal)) : '';
  npIsNeg = currentVal < 0;
  document.getElementById('np-title').textContent = title;
  document.getElementById('np-unit').textContent = unit;
  document.getElementById('np-neg-btn').style.display = type === 'receivePrice' ? 'flex' : 'none';
  // 단가는 +500/-500 퀵버튼
  if (type === 'receivePrice') {
    document.getElementById('np-quick').innerHTML =
      '<div class="np-quick-btn" onclick="npQuickAdj(-1000)">−1,000</div>' +
      '<div class="np-quick-btn" onclick="npQuickAdj(-500)">−500</div>' +
      '<div class="np-quick-btn" onclick="npQuickAdj(500)">+500</div>' +
      '<div class="np-quick-btn" onclick="npQuickAdj(1000)">+1,000</div>';
  } else {
    document.getElementById('np-quick').innerHTML = '';
  }
  npUpdateDisplay();
  document.getElementById('np-overlay').classList.add('open');
}

function npQuickAdj(delta) {
  const cur = parseInt(npStr) || 0;
  const newVal = Math.max(0, cur + delta);
  npStr = String(newVal);
  npUpdateDisplay();
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
