<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
<title>발주 관리</title>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, set, get, update, remove, onValue, query, orderByChild, startAt, endAt } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCzY1WnLBciwnoqVTOYRsj72TbElaj7pwU",
    authDomain: "order-5bd91.firebaseapp.com",
    databaseURL: "https://order-5bd91-default-rtdb.firebaseio.com",
    projectId: "order-5bd91",
    appId: "1:1048533659889:web:5472bcdca9fd15e548f950"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  window._db = db;
  window._dbRef = ref;
  window._dbFns = { push, set, get, update, remove, onValue, query, orderByChild, startAt, endAt, ref };

  window.dispatchEvent(new Event('firebase-ready'));
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --border: #2e3350;
  --accent: #4f8ef7;
  --accent2: #7c5cfc;
  --success: #34d399;
  --warning: #fbbf24;
  --danger: #f87171;
  --text: #e8eaf6;
  --text2: #8892b0;
  --text3: #4a5568;
  --tab-h: 56px;
  --header-h: 52px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  overflow: hidden;
}

/* ── 헤더 ── */
#header {
  position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; z-index: 100;
}
#header h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
#header h1 span { color: var(--accent); }
#conn-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--text3); transition: background .3s;
}
#conn-dot.ok { background: var(--success); }
#conn-dot.err { background: var(--danger); }

/* ── 탭바 ── */
#tabbar {
  position: fixed; bottom: 0; left: 0; right: 0; height: var(--tab-h);
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex; z-index: 100;
}
.tab-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 3px; cursor: pointer; border: none;
  background: none; color: var(--text3); font-size: 10px;
  font-family: inherit; transition: color .2s;
}
.tab-btn svg { width: 20px; height: 20px; }
.tab-btn.active { color: var(--accent); }
.tab-btn.active svg { filter: drop-shadow(0 0 4px var(--accent)); }

/* ── 페이지 ── */
.page {
  position: fixed; top: var(--header-h); left: 0; right: 0;
  bottom: var(--tab-h);
  overflow-y: auto; overflow-x: hidden;
  display: none; flex-direction: column;
  -webkit-overflow-scrolling: touch;
}
.page.active { display: flex; }

/* ── 공통 UI ── */
.section { padding: 12px 14px; }
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
}
.card + .card { margin-top: 8px; }

.row {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; border-bottom: 1px solid var(--border);
}
.row:last-child { border-bottom: none; }

.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px; padding: 0 16px; height: 38px; border-radius: 8px;
  font-size: 13px; font-weight: 500; font-family: inherit;
  border: none; cursor: pointer; transition: all .15s; white-space: nowrap;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:active { background: #3a7de0; }
.btn-ghost {
  background: transparent; color: var(--text2);
  border: 1px solid var(--border);
}
.btn-ghost:active { background: var(--border); }
.btn-success { background: var(--success); color: #0f1117; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-sm { height: 30px; padding: 0 10px; font-size: 12px; border-radius: 6px; }
.btn-xs { height: 24px; padding: 0 8px; font-size: 11px; border-radius: 5px; }

input, select, textarea {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-family: inherit; font-size: 14px;
  border-radius: 8px; padding: 8px 10px; outline: none; width: 100%;
  transition: border-color .15s;
}
input:focus, select:focus { border-color: var(--accent); }
select option { background: var(--surface2); }

label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 4px; }

.badge {
  display: inline-flex; align-items: center; padding: 2px 7px;
  border-radius: 20px; font-size: 11px; font-weight: 600;
}
.badge-blue { background: rgba(79,142,247,.2); color: var(--accent); }
.badge-green { background: rgba(52,211,153,.2); color: var(--success); }
.badge-yellow { background: rgba(251,191,36,.2); color: var(--warning); }
.badge-gray { background: var(--surface2); color: var(--text2); }

.mono { font-family: 'JetBrains Mono', monospace; }
.text-sm { font-size: 12px; }
.text-xs { font-size: 11px; }
.text2 { color: var(--text2); }
.text3 { color: var(--text3); }
.fw7 { font-weight: 700; }
.ml-auto { margin-left: auto; }
.flex { display: flex; }
.items-center { align-items: center; }
.gap4 { gap: 4px; }
.gap8 { gap: 8px; }
.gap12 { gap: 12px; }
.w-full { width: 100%; }
.mt8 { margin-top: 8px; }
.mt12 { margin-top: 12px; }

/* ── 숫자패드 ── */
#numpad-overlay {
  position: fixed; inset: 0; z-index: 500;
  display: none; flex-direction: column; justify-content: flex-end;
  background: rgba(0,0,0,.6); backdrop-filter: blur(2px);
}
#numpad-overlay.open { display: flex; }
#numpad-box {
  background: var(--surface); border-top: 1px solid var(--border);
  border-radius: 18px 18px 0 0; padding: 12px;
}
#numpad-label {
  text-align: center; font-size: 12px; color: var(--text2);
  margin-bottom: 6px;
}
#numpad-display {
  text-align: center; font-size: 28px; font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  padding: 8px; color: var(--accent); min-height: 48px;
  letter-spacing: 1px;
}
#numpad-unit {
  text-align: center; font-size: 12px; color: var(--text3); margin-bottom: 8px;
}
.numpad-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
}
.np-btn {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; height: 54px; font-size: 20px; font-weight: 600;
  color: var(--text); font-family: 'JetBrains Mono', monospace;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background .1s; user-select: none;
}
.np-btn:active { background: var(--border); }
.np-btn.special { font-size: 14px; color: var(--text2); }
.np-btn.confirm { background: var(--accent); color: #fff; font-size: 15px; }
.np-btn.confirm:active { background: #3a7de0; }

/* ── 발주입력 탭 ── */
.cat-scroll {
  display: flex; gap: 8px; overflow-x: auto; padding: 10px 14px;
  scrollbar-width: none;
}
.cat-scroll::-webkit-scrollbar { display: none; }
.cat-chip {
  flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 500; cursor: pointer;
  background: var(--surface2); color: var(--text2);
  border: 1px solid var(--border); transition: all .15s;
}
.cat-chip.active {
  background: var(--accent); color: #fff; border-color: var(--accent);
}

.item-row {
  display: flex; align-items: center; padding: 10px 12px;
  border-bottom: 1px solid var(--border); gap: 10px;
}
.item-row:last-child { border-bottom: none; }
.item-name { flex: 1; font-size: 13px; font-weight: 500; }
.item-unit { font-size: 11px; color: var(--text3); }
.item-price { font-size: 11px; color: var(--text2); margin-right: 4px; }
.qty-box {
  display: flex; align-items: center; gap: 0;
  background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
  overflow: hidden;
}
.qty-btn {
  width: 32px; height: 32px; background: none; border: none;
  color: var(--text2); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.qty-btn:active { background: var(--border); }
.qty-val {
  min-width: 36px; text-align: center; font-size: 14px; font-weight: 700;
  font-family: 'JetBrains Mono', monospace; color: var(--text);
  cursor: pointer; padding: 0 2px;
}
.qty-val.has-val { color: var(--accent); }

/* 발주 요약바 */
#order-summary-bar {
  padding: 10px 14px; background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}

/* ── 발주내역 탭 ── */
.order-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; margin: 0 14px 8px; overflow: hidden;
}
.order-card-header {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.order-card-body { display: none; }
.order-card-body.open { display: block; }
.order-item-row {
  display: flex; align-items: center; padding: 8px 12px;
  border-bottom: 1px solid var(--border); font-size: 13px;
  gap: 8px;
}
.order-item-row:last-child { border-bottom: none; }
.check-btn {
  width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border);
  background: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all .15s;
}
.check-btn.checked { background: var(--success); border-color: var(--success); }

/* ── 통계 ── */
.stat-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  padding: 0 14px; margin-bottom: 12px;
}
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 12px;
}
.stat-label { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
.stat-value { font-size: 20px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

.rank-row {
  display: flex; align-items: center; padding: 8px 12px;
  border-bottom: 1px solid var(--border); gap: 8px;
}
.rank-no {
  width: 22px; text-align: center; font-size: 12px; font-weight: 700;
  color: var(--text3); font-family: 'JetBrains Mono', monospace;
}
.rank-bar-wrap { flex: 1; }
.rank-bar {
  height: 6px; border-radius: 3px; background: var(--accent);
  transition: width .5s ease;
}
.rank-amt { font-size: 12px; font-family: 'JetBrains Mono', monospace; color: var(--text2); }

/* ── 가격변동 ── */
.price-item {
  padding: 10px 12px; border-bottom: 1px solid var(--border);
}
.price-item:last-child { border-bottom: none; }
.price-history {
  display: flex; gap: 6px; overflow-x: auto; margin-top: 6px;
  scrollbar-width: none; padding-bottom: 2px;
}
.price-history::-webkit-scrollbar { display: none; }
.price-dot {
  flex-shrink: 0; font-size: 10px; padding: 3px 7px;
  background: var(--surface2); border-radius: 5px;
  font-family: 'JetBrains Mono', monospace; color: var(--text2);
  white-space: nowrap;
}
.price-dot.latest { color: var(--warning); background: rgba(251,191,36,.1); }
.price-change {
  font-size: 11px; font-family: 'JetBrains Mono', monospace;
}
.price-change.up { color: var(--danger); }
.price-change.dn { color: var(--success); }

/* ── 모달 ── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,.7); display: none;
  align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--surface); border-top: 1px solid var(--border);
  border-radius: 18px 18px 0 0; width: 100%;
  max-height: 80vh; overflow-y: auto; padding: 16px;
}
.modal-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; }

/* ── 확정 모달 ── */
.confirm-order-list { margin-bottom: 14px; }
.confirm-item { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; border-bottom: 1px solid var(--border); }
.confirm-item:last-child { border-bottom: none; }
.confirm-actions { display: flex; gap: 8px; flex-wrap: wrap; }

/* ── 필터바 ── */
.filter-bar {
  display: flex; gap: 6px; padding: 10px 14px; overflow-x: auto;
  scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-chip {
  flex-shrink: 0; padding: 5px 12px; border-radius: 20px; font-size: 12px;
  font-weight: 500; cursor: pointer; background: var(--surface2);
  color: var(--text2); border: 1px solid var(--border); transition: all .15s;
}
.filter-chip.active { background: var(--accent2); color: #fff; border-color: var(--accent2); }

/* 날짜 범위 */
.date-range { display: flex; gap: 6px; padding: 0 14px 10px; align-items: center; }
.date-range input[type=date] { flex: 1; font-size: 12px; }

/* 빈 상태 */
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 48px 24px; gap: 10px; color: var(--text3);
}
.empty-state svg { opacity: .3; }

/* 로딩 */
.spinner {
  width: 32px; height: 32px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .7s linear infinite; margin: 32px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* 토스트 */
#toast {
  position: fixed; bottom: calc(var(--tab-h) + 12px); left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface2); color: var(--text); padding: 10px 20px;
  border-radius: 24px; font-size: 13px; opacity: 0; pointer-events: none;
  transition: all .25s; z-index: 999; white-space: nowrap;
  border: 1px solid var(--border);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* 섹션 헤더 */
.sec-hdr {
  font-size: 11px; font-weight: 700; color: var(--text3);
  letter-spacing: 1px; text-transform: uppercase;
  padding: 12px 14px 6px;
}

/* 스위치 */
.switch-wrap { display: flex; align-items: center; gap: 8px; }
.switch {
  position: relative; width: 38px; height: 22px;
  background: var(--border); border-radius: 11px; cursor: pointer; transition: background .2s;
}
.switch.on { background: var(--accent); }
.switch-knob {
  position: absolute; top: 3px; left: 3px; width: 16px; height: 16px;
  background: #fff; border-radius: 50%; transition: left .2s;
}
.switch.on .switch-knob { left: 19px; }

/* 분리선 */
.divider { height: 1px; background: var(--border); margin: 0 14px; }

/* 입고 확인 뱃지 */
.recv-progress { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--text3); }
</style>
</head>
<body>

<!-- 헤더 -->
<div id="header">
  <h1>🍖 <span>발주</span>관리</h1>
  <div style="display:flex;align-items:center;gap:8px">
    <span id="today-date" class="text-xs text3 mono"></span>
    <div id="conn-dot"></div>
  </div>
</div>

<!-- 페이지: 발주입력 -->
<div class="page active" id="page-order">
  <div class="cat-scroll" id="cat-scroll"></div>
  <div id="item-list" style="flex:1;overflow-y:auto"></div>
  <div id="order-summary-bar">
    <div style="flex:1">
      <div class="text-xs text2">선택 품목</div>
      <div><span id="sum-count" class="mono fw7">0</span><span class="text-xs text2">개</span></div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="resetOrder()">초기화</button>
    <button class="btn btn-primary" onclick="openConfirmModal()">
      <svg viewBox="0 0 20 20" fill="currentColor" style="width:16px;height:16px"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/></svg>
      발주 확정
    </button>
  </div>
</div>

<!-- 페이지: 발주내역 -->
<div class="page" id="page-history">
  <div class="filter-bar" id="history-filter">
    <div class="filter-chip active" data-days="7" onclick="setHistoryFilter(this,7)">7일</div>
    <div class="filter-chip" data-days="30" onclick="setHistoryFilter(this,30)">30일</div>
    <div class="filter-chip" data-days="90" onclick="setHistoryFilter(this,90)">3개월</div>
    <div class="filter-chip" data-days="0" onclick="setHistoryFilter(this,0)">전체</div>
  </div>
  <div class="date-range" id="history-search-bar">
    <input type="text" id="history-search" placeholder="품목 검색..." style="font-size:13px" oninput="renderHistory()">
  </div>
  <div id="history-list" style="flex:1;overflow-y:auto;padding:0 0 8px"></div>
</div>

<!-- 페이지: 통계 -->
<div class="page" id="page-stats">
  <div class="filter-bar" id="stats-filter">
    <div class="filter-chip active" data-period="month" onclick="setStatsFilter(this,'month')">이번달</div>
    <div class="filter-chip" data-period="year" onclick="setStatsFilter(this,'year')">올해</div>
    <div class="filter-chip" data-period="custom" onclick="setStatsFilter(this,'custom')">기간설정</div>
  </div>
  <div class="date-range" id="stats-date-range" style="display:none">
    <input type="date" id="stats-from">
    <span class="text3">~</span>
    <input type="date" id="stats-to">
    <button class="btn btn-primary btn-sm" onclick="renderStats()">조회</button>
  </div>
  <div id="stats-content" style="flex:1;overflow-y:auto;padding-bottom:12px"></div>
</div>

<!-- 페이지: 가격변동 -->
<div class="page" id="page-price">
  <div class="filter-bar" id="price-period-filter">
    <div class="filter-chip active" data-months="3" onclick="setPriceFilter(this,3)">3개월</div>
    <div class="filter-chip" data-months="6" onclick="setPriceFilter(this,6)">6개월</div>
    <div class="filter-chip" data-months="12" onclick="setPriceFilter(this,12)">1년</div>
    <div class="filter-chip" data-months="0" onclick="setPriceFilter(this,0)">전체</div>
  </div>
  <div class="date-range">
    <input type="text" id="price-search" placeholder="품목 검색..." style="font-size:13px" oninput="renderPriceChange()">
  </div>
  <div id="price-list" style="flex:1;overflow-y:auto;padding-bottom:8px"></div>
</div>

<!-- 탭바 -->
<div id="tabbar">
  <button class="tab-btn active" onclick="switchTab('order',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
    </svg>
    발주입력
  </button>
  <button class="tab-btn" onclick="switchTab('history',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    발주내역
  </button>
  <button class="tab-btn" onclick="switchTab('stats',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
    </svg>
    통계
  </button>
  <button class="tab-btn" onclick="switchTab('price',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"/>
    </svg>
    가격변동
  </button>
</div>

<!-- 숫자패드 -->
<div id="numpad-overlay" onclick="numpadClose(event)">
  <div id="numpad-box">
    <div id="numpad-label"></div>
    <div id="numpad-display">-</div>

<!-- 토스트 -->
<div id="toast"></div>

<script>
// ══════════════════════════════════════════
// 마스터 데이터 - 품목 카탈로그
// ══════════════════════════════════════════
const CATALOG = [
  // 돼지고기
  { id:'p001', cat:'돼지고기', name:'앞다리살', unit:'kg', isMeat:true, defaultPrice:8500 },
  { id:'p002', cat:'돼지고기', name:'뒷다리살', unit:'kg', isMeat:true, defaultPrice:7500 },
  { id:'p003', cat:'돼지고기', name:'삼겹살', unit:'kg', isMeat:true, defaultPrice:18000 },
  { id:'p004', cat:'돼지고기', name:'돼지머리', unit:'개', isMeat:false, defaultPrice:35000 },
  { id:'p005', cat:'돼지고기', name:'내장(소창)', unit:'kg', isMeat:true, defaultPrice:5000 },
  { id:'p006', cat:'돼지고기', name:'내장(대창)', unit:'kg', isMeat:true, defaultPrice:4500 },
  { id:'p007', cat:'돼지고기', name:'수육용 고기', unit:'kg', isMeat:true, defaultPrice:9000 },
  // 채소
  { id:'v001', cat:'채소', name:'대파', unit:'단', isMeat:false, defaultPrice:2000 },
  { id:'v002', cat:'채소', name:'양파', unit:'망', isMeat:false, defaultPrice:12000 },
  { id:'v003', cat:'채소', name:'마늘', unit:'kg', isMeat:false, defaultPrice:8000 },
  { id:'v004', cat:'채소', name:'생강', unit:'kg', isMeat:false, defaultPrice:5000 },
  { id:'v005', cat:'채소', name:'무', unit:'개', isMeat:false, defaultPrice:2000 },
  { id:'v006', cat:'채소', name:'부추', unit:'단', isMeat:false, defaultPrice:2500 },
  { id:'v007', cat:'채소', name:'고추', unit:'kg', isMeat:false, defaultPrice:12000 },
  // 양념
  { id:'s001', cat:'양념', name:'된장', unit:'kg', isMeat:false, defaultPrice:4500 },
  { id:'s002', cat:'양념', name:'고추가루', unit:'kg', isMeat:false, defaultPrice:15000 },
  { id:'s003', cat:'양념', name:'참기름', unit:'L', isMeat:false, defaultPrice:25000 },
  { id:'s004', cat:'양념', name:'들기름', unit:'L', isMeat:false, defaultPrice:18000 },
  { id:'s005', cat:'양념', name:'소금', unit:'kg', isMeat:false, defaultPrice:1500 },
  { id:'s006', cat:'양념', name:'설탕', unit:'kg', isMeat:false, defaultPrice:2000 },
  { id:'s007', cat:'양념', name:'새우젓', unit:'kg', isMeat:false, defaultPrice:12000 },
  // 주류/음료
  { id:'d001', cat:'주류', name:'소주(처음처럼)', unit:'박스', isMeat:false, defaultPrice:28000 },
  { id:'d002', cat:'주류', name:'소주(참이슬)', unit:'박스', isMeat:false, defaultPrice:28000 },
  { id:'d003', cat:'주류', name:'맥주(카스)', unit:'박스', isMeat:false, defaultPrice:35000 },
  { id:'d004', cat:'주류', name:'막걸리', unit:'박스', isMeat:false, defaultPrice:24000 },
  // 기타
  { id:'e001', cat:'기타', name:'밥(즉석)', unit:'개', isMeat:false, defaultPrice:1500 },
  { id:'e002', cat:'기타', name:'김치', unit:'kg', isMeat:false, defaultPrice:8000 },
  { id:'e003', cat:'기타', name:'계란', unit:'판', isMeat:false, defaultPrice:7000 },
  { id:'e004', cat:'기타', name:'두부', unit:'모', isMeat:false, defaultPrice:2000 },
  { id:'e005', cat:'기타', name:'당면', unit:'kg', isMeat:false, defaultPrice:5000 },
];
const CATS = ['전체', ...new Set(CATALOG.map(i=>i.cat))];

// ══════════════════════════════════════════
// 상태
// ══════════════════════════════════════════
let currentQty = {}; // id -> qty
let currentPrices = {}; // id -> price (사용자가 발주시 입력한 최신 단가)
let allOrders = []; // Firebase에서 로드한 발주 목록
let priceHistory = {}; // id -> [{date, price, memo}]
let currentCat = '전체';
let historyDays = 7;
let statsPeriod = 'month';
let priceMonths = 3;
let numpadTarget = null; // {type:'qty'|'price'|'priceEdit', id}
let numpadStr = '';
let pendingPriceEditId = null;
let firebaseReady = false;

// ══════════════════════════════════════════
// Firebase 연결
// ══════════════════════════════════════════
window.addEventListener('firebase-ready', () => {
  firebaseReady = true;
  document.getElementById('conn-dot').classList.add('ok');
  loadData();
});

function getDb() { return window._db; }
function dbRef(path) { return window._dbFns.ref(getDb(), path); }

async function loadData() {
  try {
    // 발주 내역
    const { onValue, ref } = window._dbFns;
    onValue(ref(getDb(), 'orders'), snap => {
      allOrders = [];
      snap.forEach(child => {
        allOrders.push({ key: child.key, ...child.val() });
      });
      allOrders.sort((a,b) => b.createdAt - a.createdAt);
      if (document.getElementById('page-history').classList.contains('active')) renderHistory();
      if (document.getElementById('page-stats').classList.contains('active')) renderStats();
    });

    // 가격 이력
    onValue(ref(getDb(), 'priceHistory'), snap => {
      priceHistory = snap.val() || {};
      // 현재가 초기화
      CATALOG.forEach(item => {
        if (priceHistory[item.id]) {
          const hist = priceHistory[item.id];
          const latest = hist[hist.length - 1];
          if (latest) currentPrices[item.id] = latest.price;
        }
        if (!currentPrices[item.id]) currentPrices[item.id] = item.defaultPrice;
      });
      renderItemList();
      if (document.getElementById('page-price').classList.contains('active')) renderPriceChange();
    });
  } catch(e) {
    document.getElementById('conn-dot').classList.remove('ok');
    document.getElementById('conn-dot').classList.add('err');
    showToast('Firebase 연결 실패');
  }
}

// ══════════════════════════════════════════
// 탭 전환
// ══════════════════════════════════════════
function switchTab(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'stats') renderStats();
  if (name === 'price') renderPriceChange();
}

// ══════════════════════════════════════════
// 발주입력 탭
// ══════════════════════════════════════════
function renderCats() {
  const el = document.getElementById('cat-scroll');
  el.innerHTML = CATS.map(c => `
    <div class="cat-chip ${c===currentCat?'active':''}" onclick="setCat('${c}')">${c}</div>
  `).join('');
}

function setCat(c) {
  currentCat = c;
  renderCats();
  renderItemList();
}

function renderItemList() {
  const items = currentCat === '전체' ? CATALOG : CATALOG.filter(i => i.cat === currentCat);
  const el = document.getElementById('item-list');
  if (!items.length) { el.innerHTML = '<div class="empty-state">품목 없음</div>'; return; }

  // 카테고리별 그룹
  let html = '';
  const byCat = {};
  items.forEach(item => { (byCat[item.cat] = byCat[item.cat]||[]).push(item); });
  Object.entries(byCat).forEach(([cat, catItems]) => {
    if (currentCat === '전체') html += `<div class="sec-hdr">${cat}</div>`;
    html += `<div class="card" style="margin:0 14px 8px">`;
    catItems.forEach(item => {
      const qty = currentQty[item.id] || 0;
      const price = currentPrices[item.id] || item.defaultPrice;
      html += `
        <div class="item-row" id="irow-${item.id}">
          <div style="flex:1">
            <div class="item-name">${item.name}
              ${item.isMeat ? '<span class="badge badge-blue" style="font-size:9px;margin-left:4px">육류</span>' : ''}
            </div>
            <div class="flex items-center gap4 mt2">
              <span class="item-unit text3">${item.unit}</span>
              <span class="item-price" onclick="openPriceEdit('${item.id}')" style="cursor:pointer;text-decoration:underline dotted">
                ${commas(price)}원
              </span>
            </div>
          </div>
          <div class="qty-box">
            <button class="qty-btn" onclick="changeQty('${item.id}',-1)">−</button>
            <div class="qty-val ${qty>0?'has-val':''}" onclick="openNumpad('qty','${item.id}')">${qty>0?qty:'-'}</div>
            <button class="qty-btn" onclick="changeQty('${item.id}',1)">+</button>
          </div>
        </div>
      `;
    });
    html += `</div>`;
  });
  el.innerHTML = html;
  updateSummary();
}

function changeQty(id, delta) {
  const item = CATALOG.find(i => i.id === id);
  const step = item && item.isMeat ? 0.5 : 1;
  let cur = currentQty[id] || 0;
  cur = Math.max(0, +(cur + delta * step).toFixed(1));
  currentQty[id] = cur;
  updateItemRow(id);
  updateSummary();
}

function updateItemRow(id) {
  const qty = currentQty[id] || 0;
  const qv = document.querySelector(`#irow-${id} .qty-val`);
  if (qv) {
    qv.textContent = qty > 0 ? qty : '-';
    qv.classList.toggle('has-val', qty > 0);
  }
}

function updateSummary() {
  const count = Object.values(currentQty).filter(v => v > 0).length;
  document.getElementById('sum-count').textContent = count;
}

function resetOrder() {
  if (!Object.values(currentQty).some(v => v > 0)) return;
  if (!confirm('입력 내용을 초기화할까요?')) return;
  currentQty = {};
  renderItemList();
}

// ══════════════════════════════════════════
// 발주 확정 모달
// ══════════════════════════════════════════
function openConfirmModal() {
  const items = CATALOG.filter(i => (currentQty[i.id] || 0) > 0);
  if (!items.length) { showToast('발주 품목을 선택하세요'); return; }
  const listEl = document.getElementById('confirm-list');
  listEl.innerHTML = items.map(item => {
    const qty = currentQty[item.id];
    const price = currentPrices[item.id] || item.defaultPrice;
    return `
      <div class="confirm-item">
        <span>${item.name}</span>
        <span class="mono">${qty} ${item.unit} × ${commas(price)}원 = <b>${commas(qty*price)}원</b></span>
      </div>
    `;
  }).join('');
  document.getElementById('order-memo').value = '';
  openModalById('confirm-modal');
}

async function submitOrder() {
  const items = CATALOG.filter(i => (currentQty[i.id] || 0) > 0);
  if (!items.length) return;
  const { push, set } = window._dbFns;
  const now = Date.now();
  const orderData = {
    createdAt: now,
    dateStr: toDateStr(now),
    memo: document.getElementById('order-memo').value.trim(),
    status: 'ordered', // ordered | partial | received
    items: items.map(item => ({
      id: item.id,
      name: item.name,
      cat: item.cat,
      unit: item.unit,
      qty: currentQty[item.id],
      price: currentPrices[item.id] || item.defaultPrice,
      received: false,
      receivedQty: 0,
    }))
  };
  try {
    const newRef = push(dbRef('orders'));
    await set(newRef, orderData);
    // 가격 이력 업데이트
    for (const item of items) {
      const p = currentPrices[item.id] || item.defaultPrice;
      await recordPrice(item.id, p, '');
    }
    closeModalById('confirm-modal');
    currentQty = {};
    renderItemList();
    showToast('발주가 저장되었습니다 ✓');
    // URL/문자 옵션
    openOrderActionModal(newRef.key, orderData);
  } catch(e) {
    showToast('저장 실패: ' + e.message);
  }
}

function openOrderActionModal(key, order) {
  const el = document.getElementById('order-action-content');
  const text = makeOrderText(order);
  el.innerHTML = `
    <p class="text-sm text2" style="margin-bottom:12px">발주서가 저장되었습니다. 공유 방법을 선택하세요.</p>
    <div style="background:var(--surface2);border-radius:8px;padding:10px;margin-bottom:12px;font-size:12px;font-family:monospace;white-space:pre;overflow-x:auto">${escHtml(text)}</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button class="btn btn-primary w-full" onclick="copyOrderText('${key}')">
        📋 텍스트 복사 (카카오톡 붙여넣기)
      </button>
      <button class="btn btn-ghost w-full" onclick="smsOrder('${key}')">
        📱 문자 발송
      </button>
      <button class="btn btn-ghost w-full" onclick="closeModalById('order-action-modal')">
        닫기
      </button>
    </div>
  `;
  document.getElementById('order-action-title').textContent = '✅ 발주 완료';
  openModalById('order-action-modal');
}

function makeOrderText(order) {
  const d = new Date(order.createdAt);
  const ds = `${d.getMonth()+1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  let txt = `[발주] ${ds}\n`;
  if (order.memo) txt += `메모: ${order.memo}\n`;
  txt += `─────────────\n`;
  order.items.forEach(i => {
    txt += `${i.name} ${i.qty}${i.unit} (${commas(i.price)}원)\n`;
  });
  const total = order.items.reduce((s,i) => s + i.qty * i.price, 0);
  txt += `─────────────\n합계: ${commas(total)}원`;
  return txt;
}

function copyOrderText(key) {
  const order = allOrders.find(o => o.key === key);
  if (!order) { showToast('발주 데이터 없음'); return; }
  navigator.clipboard.writeText(makeOrderText(order)).then(() => showToast('복사되었습니다'));
}

function smsOrder(key) {
  const order = allOrders.find(o => o.key === key);
  if (!order) { showToast('발주 데이터 없음'); return; }
  const txt = encodeURIComponent(makeOrderText(order));
  window.location.href = `sms:?body=${txt}`;
}

// ══════════════════════════════════════════
// 발주내역 탭
// ══════════════════════════════════════════
function setHistoryFilter(el, days) {
  document.querySelectorAll('#history-filter .filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  historyDays = days;
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('history-list');
  const search = (document.getElementById('history-search').value || '').trim().toLowerCase();
  const cutoff = historyDays > 0 ? Date.now() - historyDays * 86400000 : 0;
  let orders = allOrders.filter(o => o.createdAt >= cutoff);
  if (search) orders = orders.filter(o =>
    o.items && o.items.some(i => i.name.toLowerCase().includes(search))
  );
  if (!orders.length) {
    el.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg><span>발주 내역 없음</span></div>';
    return;
  }
  el.innerHTML = orders.map(order => {
    const d = new Date(order.createdAt);
    const ds = `${d.getMonth()+1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    const total = order.items ? order.items.reduce((s,i)=>s+i.qty*i.price,0) : 0;
    const recvd = order.items ? order.items.filter(i=>i.received).length : 0;
    const totalItems = order.items ? order.items.length : 0;
    const allRecv = recvd === totalItems && totalItems > 0;
    const statusBadge = allRecv
      ? '<span class="badge badge-green">입고완료</span>'
      : recvd > 0
        ? `<span class="badge badge-yellow">부분입고 ${recvd}/${totalItems}</span>`
        : '<span class="badge badge-gray">발주중</span>';

    return `
      <div class="order-card" id="ocard-${order.key}">
        <div class="order-card-header" onclick="toggleOrderCard('${order.key}')">
          <div style="flex:1">
            <div class="flex items-center gap8">
              <span class="mono fw7">${ds}</span>
              ${statusBadge}
            </div>
            <div class="flex items-center gap8 mt2">
              <span class="text-xs text2">${totalItems}품목</span>
              <span class="text-xs mono">${commas(total)}원</span>
              ${order.memo ? `<span class="text-xs text3">· ${order.memo}</span>` : ''}
            </div>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            <button class="btn btn-ghost btn-xs" onclick="event.stopPropagation();openShareModal('${order.key}')">공유</button>
            <svg viewBox="0 0 20 20" fill="currentColor" style="width:16px;height:16px;color:var(--text3);flex-shrink:0" id="ocard-arr-${order.key}">
              <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"/>
            </svg>
          </div>
        </div>
        <div class="order-card-body" id="obody-${order.key}">
          ${(order.items||[]).map((item,idx) => `
            <div class="order-item-row">
              <button class="check-btn ${item.received?'checked':''}"
                onclick="toggleItemReceived('${order.key}',${idx})"
                title="입고 확인">
                ${item.received ? '<svg viewBox="0 0 20 20" fill="white" width="12" height="12"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/></svg>' : ''}
              </button>
              <span style="flex:1;font-size:13px;${item.received?'text-decoration:line-through;color:var(--text3)':''}">${item.name}</span>
              <span class="mono text-xs">${item.qty}${item.unit}</span>
              <span class="mono text-xs text2">${commas(item.price)}원</span>
            </div>
          `).join('')}
          <div style="padding:8px 12px;display:flex;justify-content:flex-end;gap:8px">
            <button class="btn btn-ghost btn-xs" style="color:var(--danger)" onclick="deleteOrder('${order.key}')">삭제</button>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function toggleOrderCard(key) {
  const body = document.getElementById('obody-' + key);
  const arr = document.getElementById('ocard-arr-' + key);
  const open = body.classList.toggle('open');
  if (arr) arr.style.transform = open ? 'rotate(180deg)' : '';
}

async function toggleItemReceived(orderKey, itemIdx) {
  const order = allOrders.find(o => o.key === orderKey);
  if (!order) return;
  const { update } = window._dbFns;
  const item = order.items[itemIdx];
  const newVal = !item.received;
  try {
    await update(dbRef(`orders/${orderKey}/items/${itemIdx}`), { received: newVal });
    showToast(newVal ? '입고 확인 ✓' : '입고 취소');
  } catch(e) { showToast('업데이트 실패'); }
}

async function deleteOrder(key) {
  if (!confirm('발주 내역을 삭제할까요?')) return;
  const { remove } = window._dbFns;
  try {
    await remove(dbRef('orders/' + key));
    showToast('삭제되었습니다');
  } catch(e) { showToast('삭제 실패'); }
}

function openShareModal(key) {
  const order = allOrders.find(o => o.key === key);
  if (!order) return;
  const el = document.getElementById('order-action-content');
  const text = makeOrderText(order);
  el.innerHTML = `
    <div style="background:var(--surface2);border-radius:8px;padding:10px;margin-bottom:12px;font-size:12px;font-family:monospace;white-space:pre;overflow-x:auto">${escHtml(text)}</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button class="btn btn-primary w-full" onclick="navigator.clipboard.writeText(${JSON.stringify(text)}).then(()=>showToast('복사 완료'))">📋 텍스트 복사</button>
      <button class="btn btn-ghost w-full" onclick="window.location.href='sms:?body='+encodeURIComponent(${JSON.stringify(text)})">📱 문자 발송</button>
      <button class="btn btn-ghost w-full" onclick="closeModalById('order-action-modal')">닫기</button>
    </div>
  `;
  document.getElementById('order-action-title').textContent = '발주서 공유';
  openModalById('order-action-modal');
}

// ══════════════════════════════════════════
// 통계 탭
// ══════════════════════════════════════════
function setStatsFilter(el, period) {
  document.querySelectorAll('#stats-filter .filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  statsPeriod = period;
  document.getElementById('stats-date-range').style.display = period === 'custom' ? 'flex' : 'none';
  if (period !== 'custom') renderStats();
}

function renderStats() {
  const el = document.getElementById('stats-content');
  const now = new Date();
  let from, to;
  if (statsPeriod === 'month') {
    from = new Date(now.getFullYear(), now.getMonth(), 1);
    to = new Date(now.getFullYear(), now.getMonth()+1, 0);
  } else if (statsPeriod === 'year') {
    from = new Date(now.getFullYear(), 0, 1);
    to = new Date(now.getFullYear(), 11, 31);
  } else {
    from = new Date(document.getElementById('stats-from').value || now);
    to = new Date(document.getElementById('stats-to').value || now);
  }
  const fromTs = from.getTime();
  const toTs = to.getTime() + 86400000;
  const filtered = allOrders.filter(o => o.createdAt >= fromTs && o.createdAt < toTs);

  // 합계
  let totalAmt = 0, totalOrders = filtered.length;
  const itemTotals = {}; // name -> {qty, amt, unit}
  filtered.forEach(order => {
    (order.items||[]).forEach(item => {
      totalAmt += item.qty * item.price;
      if (!itemTotals[item.name]) itemTotals[item.name] = { qty:0, amt:0, unit:item.unit };
      itemTotals[item.name].qty += item.qty;
      itemTotals[item.name].amt += item.qty * item.price;
    });
  });

  const ranked = Object.entries(itemTotals).sort((a,b)=>b[1].amt-a[1].amt);
  const maxAmt = ranked[0]?.[1]?.amt || 1;

  el.innerHTML = `
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">총 발주금액</div>
        <div class="stat-value" style="font-size:16px">${commas(totalAmt)}원</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">발주 횟수</div>
        <div class="stat-value">${totalOrders}건</div>
      </div>
    </div>
    <div class="sec-hdr">품목별 발주금액 순위</div>
    <div class="card" style="margin:0 14px">
      ${ranked.length === 0 ? '<div class="empty-state" style="padding:24px">데이터 없음</div>' :
        ranked.slice(0,15).map(([name, data], idx) => `
          <div class="rank-row">
            <div class="rank-no">${idx+1}</div>
            <div class="rank-bar-wrap">
              <div style="font-size:12px;margin-bottom:3px">${name}
                <span class="text-xs text3">${data.qty.toFixed(1)}${data.unit}</span>
              </div>
              <div class="rank-bar" style="width:${Math.round(data.amt/maxAmt*100)}%"></div>
            </div>
            <div class="rank-amt">${commas(data.amt)}원</div>
          </div>
        `).join('')
      }
    </div>
  `;
}

// ══════════════════════════════════════════
// 가격변동 탭
// ══════════════════════════════════════════
function setPriceFilter(el, months) {
  document.querySelectorAll('#price-period-filter .filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  priceMonths = months;
  renderPriceChange();
}

function renderPriceChange() {
  const el = document.getElementById('price-list');
  const search = (document.getElementById('price-search').value || '').trim().toLowerCase();
  const cutoff = priceMonths > 0 ? Date.now() - priceMonths * 30 * 86400000 : 0;

  const items = CATALOG.filter(i => !search || i.name.toLowerCase().includes(search));
  if (!items.length) { el.innerHTML = '<div class="empty-state">품목 없음</div>'; return; }

  const byCat = {};
  items.forEach(i => { (byCat[i.cat]=byCat[i.cat]||[]).push(i); });

  el.innerHTML = Object.entries(byCat).map(([cat, catItems]) => `
    <div class="sec-hdr">${cat}</div>
    <div class="card" style="margin:0 14px 8px">
      ${catItems.map(item => {
        const hist = (priceHistory[item.id] || []).filter(h => !cutoff || h.date >= cutoff);
        const latest = hist[hist.length-1];
        const prev = hist[hist.length-2];
        let changeEl = '';
        if (latest && prev) {
          const diff = latest.price - prev.price;
          const pct = ((diff/prev.price)*100).toFixed(1);
          changeEl = `<span class="price-change ${diff>0?'up':'dn'}">${diff>0?'▲':'▼'}${Math.abs(diff)}원(${pct}%)</span>`;
        }
        return `
          <div class="price-item">
            <div class="flex items-center gap8">
              <span style="font-size:13px;font-weight:600;flex:1">${item.name}</span>
              <span class="mono fw7">${commas(latest?.price||item.defaultPrice)}원/${item.unit}</span>
              ${changeEl}
              <button class="btn btn-ghost btn-xs" onclick="openPriceEdit('${item.id}')">수정</button>
            </div>
            <div class="price-history">
              ${hist.slice(-10).map((h,i,arr)=>`
                <div class="price-dot ${i===arr.length-1?'latest':''}">
                  ${fmtDate(h.date)} ${commas(h.price)}원${h.memo?` (${h.memo})`:''}
                </div>
              `).join('')}
              ${hist.length===0?`<span class="text-xs text3">이력 없음 (기본가: ${commas(item.defaultPrice)}원)</span>`:''}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `).join('');
}

// ══════════════════════════════════════════
// 가격 수정
// ══════════════════════════════════════════
function openPriceEdit(id) {
  const item = CATALOG.find(i => i.id === id);
  if (!item) return;
  pendingPriceEditId = id;
  document.getElementById('price-edit-title').textContent = `가격 수정 - ${item.name}`;
  document.getElementById('price-edit-val').value = currentPrices[id] || item.defaultPrice;
  document.getElementById('price-edit-memo').value = '';
  openModalById('price-edit-modal');
}

async function savePriceEdit() {
  const id = pendingPriceEditId;
  if (!id) return;
  const val = parseInt(document.getElementById('price-edit-val').value);
  const memo = document.getElementById('price-edit-memo').value.trim();
  if (!val || val <= 0) { showToast('올바른 금액을 입력하세요'); return; }
  currentPrices[id] = val;
  await recordPrice(id, val, memo);
  closeModalById('price-edit-modal');
  renderItemList();
  showToast('가격이 업데이트되었습니다');
}

async function recordPrice(id, price, memo) {
  const { push, set } = window._dbFns;
  const entry = { date: Date.now(), price, memo: memo || '' };
  const newRef = push(dbRef(`priceHistory/${id}`));
  await set(newRef, entry);
}

// ══════════════════════════════════════════
// 숫자패드
// ══════════════════════════════════════════
function openNumpad(type, id) {
  const item = CATALOG.find(i => i.id === id);
  numpadTarget = { type, id };
  numpadStr = '';
  const label = type === 'qty' ? `${item?.name} 수량 (${item?.unit})` : `${item?.name} 단가 (원)`;
  document.getElementById('numpad-label').textContent = label;
  document.getElementById('numpad-display').textContent = '-';
  document.getElementById('numpad-unit').textContent = type === 'qty' ? item?.unit || '' : '원';
  document.getElementById('numpad-overlay').classList.add('open');
}

function numpadClose(e) {
  if (e.target === document.getElementById('numpad-overlay')) {
    document.getElementById('numpad-overlay').classList.remove('open');
  }
}

function npInput(c) {
  if (c === '.' && numpadStr.includes('.')) return;
  numpadStr += c;
  document.getElementById('numpad-display').textContent = numpadStr || '-';
}

function npBackspace() {
  numpadStr = numpadStr.slice(0,-1);
  document.getElementById('numpad-display').textContent = numpadStr || '-';
}

function npClear() {
  numpadStr = '';
  document.getElementById('numpad-display').textContent = '-';
}

function npConfirm() {
  if (!numpadTarget || !numpadStr) { document.getElementById('numpad-overlay').classList.remove('open'); return; }
  const val = parseFloat(numpadStr);
  if (isNaN(val) || val < 0) { showToast('올바른 값 입력'); return; }
  const { type, id } = numpadTarget;
  if (type === 'qty') {
    currentQty[id] = val;
    updateItemRow(id);
    updateSummary();
  }
  document.getElementById('numpad-overlay').classList.remove('open');
}

// ══════════════════════════════════════════
// 모달 헬퍼
// ══════════════════════════════════════════
function openModalById(id) { document.getElementById(id).classList.add('open'); }
function closeModalById(id) { document.getElementById(id).classList.remove('open'); }
function closeModal(id, e) { if (e.target === document.getElementById(id)) closeModalById(id); }

// ══════════════════════════════════════════
// 유틸
// ══════════════════════════════════════════
function commas(n) { return (n||0).toLocaleString('ko-KR'); }
function pad(n) { return String(n).padStart(2,'0'); }
function toDateStr(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function fmtDate(ts) {
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()}`;
}
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ══════════════════════════════════════════
// 초기화
// ══════════════════════════════════════════
document.getElementById('today-date').textContent = toDateStr(Date.now());
renderCats();
renderItemList();

// Firebase 없어도 기본 렌더
if (!firebaseReady) {
  setTimeout(() => {
    if (!firebaseReady) showToast('Firebase 연결 중...');
  }, 2000);
}
</script>
