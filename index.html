<div id="installBanner">

<script>
/* ===== PWA: 서비스워커 인라인 등록 ===== */
(function(){
  if(!('serviceWorker' in navigator)) return;
  const swCode = `
const CACHE = 'bajuapp-v1';
const ASSETS = ['/reataurant/', '/reataurant/index.html'];
self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(c => c.addAll(ASSETS)).catch(()=>{})
  );
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))
    )
  );
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  if(e.request.method !== 'GET') return;
  const url = new URL(e.request.url);
  // Google Sheets API는 캐시 제외
  if(url.hostname.includes('script.google.com')) return;
  e.respondWith(
    fetch(e.request).then(res => {
      const clone = res.clone();
      caches.open(CACHE).then(c => c.put(e.request, clone));
      return res;
    }).catch(() => caches.match(e.request))
  );
});
`;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, {scope: '/reataurant/'})
    .catch(()=>{
      // scope 실패시 기본 scope로 재시도
      navigator.serviceWorker.register(swUrl).catch(()=>{});
    });
})();

/* ===== PWA: 설치 프롬프트 ===== */
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // 이미 설치됐으면 배너 안 띄움
  if(window.matchMedia('(display-mode: standalone)').matches) return;
  document.getElementById('installBanner').classList.add('show');
});
function doInstall(){
  document.getElementById('installBanner').classList.remove('show');
  if(deferredPrompt){ deferredPrompt.prompt(); deferredPrompt=null; }
}
function dismissInstall(){
  document.getElementById('installBanner').classList.remove('show');
  localStorage.setItem('pwaInstallDismissed','1');
}
window.addEventListener('appinstalled', ()=>{
  document.getElementById('installBanner').classList.remove('show');
});

/* ===== 앱 메인 코드 ===== */
const SK_ING='rzr_ing_v9', SK_HIST='rzr_hist_v9', SK_PH='rzr_ph_v9';
const DEFAULT_CATS=['야채','행운','특공대','김치A','김치B','안성','주류','쌀','물수건','음료수'];
const SK_CATS='rzr_cats_v9';
const SK_PHONES='rzr_phones_v9';   // {카테고리: 전화번호}
const SK_SETTINGS='rzr_settings_v9'; // {storeName, greeting, closing}
const SK_DELIVERY='rzr_delivery_v9'; // 입고대기 목록
const SHEETS_URL='https://script.google.com/macros/s/AKfycbybhqC4i7Co4wsGTxeKwyeCHyBC63oDvEzuhLF64lTWfVvsvNvU_DGYxmzQ9k1Sb_po/exec';

async function syncToSheets(){
  try{
    const res=await fetch(SHEETS_URL,{method:'POST',body:JSON.stringify({
      action:'saveAll',
      ingredients,history,priceHist,cats:customCats
    })});
    const j=await res.json();
    return j.success;
  }catch(e){return false;}
}

async function loadFromSheets(){
  try{
    const res=await fetch(SHEETS_URL+'?t='+Date.now());
    const j=await res.json();
    if(!j.success)return false;
    const p=j.payload;
    if(p.cats&&p.cats.length)customCats=p.cats;
    if(p.ingredients&&p.ingredients.length)ingredients=p.ingredients;
    if(p.history)history=p.history;
    if(p.priceHist)priceHist=p.priceHist;
    if(p.catPhones)catPhones=p.catPhones;
    if(p.appSettings)appSettings={...appSettings,...p.appSettings};
    saveCats();saveIng();saveHist();savePH();savePhones();saveSettings();
    return true;
  }catch(e){return false;}
}
let customCats=[];
function getCats(){return['전체',...customCats];}
function getCatsOnly(){return customCats;}
function saveCats(){try{localStorage.setItem(SK_CATS,JSON.stringify(customCats));}catch{} scheduleSave();}
const DEFAULT_ING=[
  {id:1,name:'대파',cat:'야채',unit:'단',price:1200,qty:0},
  {id:2,name:'양파',cat:'야채',unit:'kg',price:1800,qty:0},
  {id:3,name:'행운 소주',cat:'행운',unit:'박스',price:18000,qty:0},
  {id:4,name:'특공대 소주',cat:'특공대',unit:'박스',price:17000,qty:0},
  {id:5,name:'김치A',cat:'김치A',unit:'kg',price:3500,qty:0},
  {id:6,name:'김치B',cat:'김치B',unit:'박스',price:3200,qty:0},
  {id:7,name:'안성탕면',cat:'안성',unit:'박스',price:15000,qty:0},
  {id:8,name:'맥주',cat:'주류',unit:'박스',price:32000,qty:0},
  {id:9,name:'쌀',cat:'쌀',unit:'kg',price:2200,qty:0},
  {id:10,name:'물수건',cat:'물수건',unit:'박스',price:8000,qty:0},
  {id:11,name:'콜라',cat:'음료수',unit:'박스',price:16000,qty:0},
];

let ingredients=[], history=[], priceHist={};
let catPhones={};  // {카테고리명: 전화번호}
let appSettings={storeName:'범방동영진돼지국밥', greeting:'안녕하세요', closing:'부탁드립니다\n감사합니다~'};
let deliveryList=[]; // [{orderId, orderDate, items:[{name,cat,unit,qty,actualPrice}], confirmed}]
let curTab='order', curCat='전체', histOpenIds=new Set(), statsPeriod='1년', histMonth='', statsCustomFrom='', statsCustomTo='';
let numpadTarget=null, numpadVal='', phFilter='all';

const fmt=n=>Number(n).toLocaleString('ko-KR')+'원';
const fmtS=n=>Number(n).toLocaleString('ko-KR')+'원';
const fmtD=d=>{const t=new Date(d);return`${t.getFullYear()}.${pad(t.getMonth()+1)}.${pad(t.getDate())}`;};
const fmtDT=d=>{const t=new Date(d);return`${pad(t.getMonth()+1)}.${pad(t.getDate())} ${pad(t.getHours())}:${pad(t.getMinutes())}`;};
const pad=n=>String(n).padStart(2,'0');

function lsGet(k){try{return localStorage.getItem(k);}catch{return null;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch{}}

function showSyncStatus(msg,color){
  const el=document.getElementById('syncStatus');
  if(el){el.textContent=msg;el.style.color=color||'#888';}
}
function setSyncStatus(msg,color){showSyncStatus(msg,color);}

async function manualSync(){
  setSyncStatus('⟳ 동기화 중...','#F5A623');
  const ok=await loadFromSheets();
  if(ok){setSyncStatus('☁ 동기화 완료','#1D9E75');updateTopbar();render();}
  else{setSyncStatus('✕ 연결 실패','#E24B4A');}
  setTimeout(()=>setSyncStatus('☁ 동기화','#888'),3000);
}

function load(){
  try{const r=lsGet(SK_CATS);customCats=r?JSON.parse(r):[...DEFAULT_CATS];}catch{customCats=[...DEFAULT_CATS];}
  try{const r=lsGet(SK_ING);ingredients=r?JSON.parse(r):DEFAULT_ING.map(x=>({...x}));}catch{ingredients=DEFAULT_ING.map(x=>({...x}));}
  try{const r=lsGet(SK_HIST);history=r?JSON.parse(r):[];}catch{history=[];}
  try{const r=lsGet(SK_PH);priceHist=r?JSON.parse(r):{};}catch{priceHist={};}
  try{const r=lsGet(SK_PHONES);catPhones=r?JSON.parse(r):{};}catch{catPhones={};}
  try{const r=lsGet(SK_SETTINGS);if(r){const s=JSON.parse(r);appSettings={...appSettings,...s};}}catch{}
  try{const r=lsGet(SK_DELIVERY);deliveryList=r?JSON.parse(r):[];}catch{deliveryList=[];}
  const now=new Date();histMonth=`${now.getFullYear()}-${pad(now.getMonth()+1)}`;
  updateTopbar();render();
  setSyncStatus('⟳ 불러오는 중...','#F5A623');
  loadFromSheets().then(ok=>{
    if(ok){setSyncStatus('☁ 동기화 완료','#1D9E75');updateTopbar();render();}
    else{setSyncStatus('☁ 오프라인','#888');}
    setTimeout(()=>setSyncStatus('☁ 동기화','#888'),3000);
  });
}
const saveIng=()=>{lsSet(SK_ING,JSON.stringify(ingredients));scheduleSave();};
const saveHist=()=>{lsSet(SK_HIST,JSON.stringify(history));scheduleSave();};
const savePH=()=>{lsSet(SK_PH,JSON.stringify(priceHist));scheduleSave();};
const savePhones=()=>{lsSet(SK_PHONES,JSON.stringify(catPhones));scheduleSave();};
const saveSettings=()=>{lsSet(SK_SETTINGS,JSON.stringify(appSettings));scheduleSave();};
const saveDelivery=()=>{lsSet(SK_DELIVERY,JSON.stringify(deliveryList));};

let saveTimer=null;
function scheduleSave(){
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>saveToSheets(),2000);
}

async function saveToSheets(){
  try{
    await fetch(SHEETS_URL,{method:'POST',body:JSON.stringify({
      action:'saveAll',
      cats:customCats,
      ingredients:ingredients,
      history:history,
      priceHist:priceHist,
      catPhones:catPhones,
      appSettings:appSettings
    })});
    showSyncStatus('✓ 저장 완료','#1D9E75');
    setTimeout(()=>showSyncStatus('☁ 동기화','#888'),2000);
  }catch(e){
    showSyncStatus('⚠ 저장 실패 (로컬만 저장됨)','#E24B4A');
    setTimeout(()=>showSyncStatus('☁ 동기화','#888'),4000);
  }
}

function recordPrice(item,oldP,newP){
  if(oldP===newP)return;
  if(!priceHist[item.id])priceHist[item.id]={name:item.name,unit:item.unit,cat:item.cat,log:[]};
  priceHist[item.id].name=item.name;
  priceHist[item.id].log.push({date:new Date().toISOString(),oldPrice:oldP,newPrice:newP});
  savePH();
}

function updateTopbar(){
  const now=new Date();
  document.getElementById('topDate').textContent=`${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())} (${['일','월','화','수','목','금','토'][now.getDay()]})`;
  const cnt=history.filter(h=>new Date(h.date).toDateString()===now.toDateString()).length;
  const pendingDlv=deliveryList.filter(d=>!d.confirmed).length;
  document.getElementById('todayStatus').textContent=cnt>0?`오늘 발주 ${cnt}건 완료`:'오늘 발주 0건';
  const dlvBadge=document.getElementById('dlvBadge');
  if(dlvBadge){dlvBadge.textContent=pendingDlv>0?`입고대기 ${pendingDlv}건`:'';dlvBadge.style.display=pendingDlv>0?'block':'none';}
}

function render(){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===curTab));
  // 입고대기 배지
  const pendingCnt=deliveryList.filter(d=>!d.confirmed).length;
  const tabDlv=document.getElementById('tabDelivery');
  if(tabDlv)tabDlv.textContent=pendingCnt>0?`입고 확인 ${pendingCnt}`:'입고 확인';
  const c=document.getElementById('tabContent');
  if(curTab==='order')c.innerHTML=buildOrder();
  else if(curTab==='delivery')c.innerHTML=buildDelivery();
  else if(curTab==='history')c.innerHTML=buildHist();
  else if(curTab==='stats')c.innerHTML=buildStats();
  else c.innerHTML=buildPrices();
  bind();
}

/* ORDER */
function buildOrder(){
  const fl=curCat==='전체'?ingredients:ingredients.filter(i=>i.cat===curCat);
  const wq=ingredients.filter(i=>i.qty>0).length;
  const chips=[...getCats().map(c=>`<div class="cat-chip${curCat===c?' active':''}" data-catsel="${c}">${c}</div>`), `<div class="cat-chip" id="addCatChip" style="border-style:dashed;color:var(--amber)">+ 카테고리</div>`].join('');
  const rows=fl.map(item=>`<div class="ing-row${item.qty>0?' has-qty':''}">
    <div class="ing-name-line">
      <div><span class="ing-name">${item.name}</span><span class="ing-cat-badge">${item.cat}</span></div>
      <button class="del-row-btn" data-di="${item.id}">삭제</button>
    </div>
    <div class="qty-row-ctrl" style="justify-content:space-between">
      <button class="qbtn" data-qm="${item.id}" style="width:42px;height:42px;font-size:22px">−</button>
      <span class="qnum" data-qedit="${item.id}" style="font-size:22px;min-width:40px;cursor:pointer;border-bottom:1.5px dashed var(--border2)">${item.qty}</span>
      <button class="qbtn" data-qp="${item.id}" style="width:42px;height:42px;font-size:22px">+</button>
    </div>
  </div>`).join('')||'<div style="text-align:center;padding:30px 0;color:#999">품목이 없습니다</div>';
  return`<div class="summary-strip" style="grid-template-columns:1fr 1fr;margin-bottom:16px">
    <div class="scard"><div class="sl">발주 품목수</div><div class="sv">${wq}건</div></div>
    <div class="scard"><div class="sl">입고대기</div><div class="sv acc">${deliveryList.filter(d=>!d.confirmed).length}건</div></div>
  </div>
  <div class="cat-row">${chips}</div>
  <div class="ing-list">${rows}</div>
  <button class="add-ing-btn" id="addIngBtn">+ 식자재 추가</button>
  <div class="confirm-bar">
    <div><div class="ctl">발주 품목</div><div class="ctv">${wq}건</div></div>
    <button class="confirm-btn" id="confBtn" ${wq===0?'disabled':''}>발주 확정 →</button>
  </div>`;
}

/* DELIVERY CONFIRMATION TAB */
function buildDelivery(){
  const pending=deliveryList.filter(d=>!d.confirmed);
  const done=deliveryList.filter(d=>d.confirmed).slice(0,10);
  let pendingHtml='';
  if(pending.length===0){
    pendingHtml='<div class="no-h">입고 대기 중인 발주가 없어요</div>';
  } else {
    pendingHtml=pending.map((d,di)=>{
      const dt=new Date(d.orderDate);
      const dtStr=`${dt.getMonth()+1}/${dt.getDate()} ${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
      const rows=d.items.map((it,ii)=>{
        const ing=ingredients.find(x=>x.name===it.name&&x.cat===it.cat);
        const lastPrice=ing?ing.price:0;
        const curPrice=it.actualPrice!=null?it.actualPrice:(lastPrice||0);
        const actualQty=it.actualQty!=null?it.actualQty:it.qty;
        const qtyChanged=it.actualQty!=null&&it.actualQty!==it.qty;
        return`<div style="padding:10px 0;border-bottom:0.5px solid var(--border)">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <div>
              <span style="font-size:14px;font-weight:500;color:var(--text)">${it.name}</span>
              <span class="dlv-qty-edit" data-di="${di}" data-ii="${ii}" style="font-size:12px;color:${qtyChanged?'var(--amber)':'var(--text2)'};margin-left:6px;cursor:pointer;border-bottom:1px dashed var(--border2)">
                ${qtyChanged?`${actualQty}${it.unit} (발주 ${it.qty})`:`${it.qty}${it.unit}`} ✎
              </span>
            </div>
            <span style="font-size:13px;font-weight:500;color:${it.actualPrice!=null?'var(--amber)':'var(--text3)'}">${it.actualPrice!=null?Number(it.actualPrice).toLocaleString()+'원':'미입력'}</span>
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            <button class="dlv-minus-btn" data-di="${di}" data-ii="${ii}" style="flex:1;padding:10px 0;border-radius:var(--r-md);border:0.5px solid var(--border2);background:var(--bg3);font-size:14px;font-weight:500;color:var(--text);cursor:pointer">−500</button>
            <button class="dlv-price-btn" data-di="${di}" data-ii="${ii}" style="flex:2;padding:10px 0;border-radius:var(--r-md);border:0.5px solid var(--border2);background:var(--bg3);font-size:13px;color:var(--text2);cursor:pointer">
              ${lastPrice>0&&it.actualPrice==null?`기준 ${lastPrice.toLocaleString()}원`:'직접입력'}
            </button>
            <button class="dlv-plus-btn" data-di="${di}" data-ii="${ii}" style="flex:1;padding:10px 0;border-radius:var(--r-md);border:0.5px solid var(--border2);background:var(--bg3);font-size:14px;font-weight:500;color:var(--amber);cursor:pointer">+500</button>
          </div>
        </div>`;
      }).join('');
      const allEntered=d.items.every(it=>it.actualPrice!=null);
      return`<div style="background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:14px;margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div>
            <div style="font-size:13px;font-weight:500;color:var(--text)">발주 ${dtStr}</div>
            <div style="font-size:11px;color:var(--text2)">${d.items.length}개 품목</div>
          </div>
          <div style="display:flex;gap:6px">
            <button class="dlv-del-btn" data-di="${di}" style="padding:6px 10px;border-radius:var(--r-md);border:0.5px solid #f09595;background:transparent;font-size:12px;color:#a32d2d;cursor:pointer">삭제</button>
            ${allEntered?`<button class="dlv-confirm-btn" data-di="${di}" style="padding:6px 12px;border-radius:var(--r-md);border:none;background:#1C1A17;color:#F5EDD8;font-size:12px;font-weight:500;cursor:pointer">입고 완료</button>`:''}
          </div>
        </div>
        ${rows}
        ${allEntered?`<div style="margin-top:10px;padding:8px 12px;background:var(--amber-bg);border-radius:var(--r-md);font-size:13px;color:var(--amber);font-weight:500">
          실 입고금액: ${Number(d.items.reduce((s,it)=>s+(it.actualPrice||0)*(it.actualQty!=null?it.actualQty:it.qty),0)).toLocaleString()}원
        </div>`:'<div style="margin-top:8px;font-size:12px;color:var(--text2)">단가 입력 후 입고 완료 버튼이 나타나요</div>'}

  const doneHtml=done.length>0?`
    <div style="font-size:12px;font-weight:500;color:var(--text2);margin-bottom:8px;margin-top:4px">최근 입고 완료</div>
    ${done.map(d=>{
      const dt=new Date(d.orderDate);
      const total=d.items.reduce((s,it)=>s+(it.actualPrice||0)*it.qty,0);
      return`<div style="background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:12px 14px;margin-bottom:8px;opacity:0.7">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="font-size:13px;color:var(--text2)">${dt.getMonth()+1}/${dt.getDate()} 발주 · ${d.items.length}개</div>
          <div style="font-size:13px;font-weight:500;color:var(--text)">${total>0?Number(total).toLocaleString()+'원':'단가 미입력'}</div>
        </div>
      </div>`;
    }).join('')}`:'';
  return`<div style="margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">
    <div style="font-size:13px;font-weight:500;color:var(--text)">입고 대기 ${pending.length}건</div>
    ${pending.length>0?`<button id="dlvClearAll" style="font-size:12px;padding:4px 10px;border-radius:var(--r-md);border:0.5px solid #f09595;background:transparent;color:#a32d2d;cursor:pointer">전체 삭제</button>`:''}
  </div>
  ${pendingHtml}
  ${doneHtml}`;
}

/* HISTORY */
function buildHist(){
  const now=new Date(); const months=[];
  for(let i=0;i<12;i++){const d=new Date(now.getFullYear(),now.getMonth()-i,1);months.push({val:`${d.getFullYear()}-${pad(d.getMonth()+1)}`,label:`${d.getFullYear()}년 ${d.getMonth()+1}월`});}
  if(!histMonth)histMonth=months[0].val;
  const fl=history.filter(h=>{const d=new Date(h.date);return`${d.getFullYear()}-${pad(d.getMonth()+1)}`===histMonth;}).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const pt=fl.reduce((s,h)=>s+h.total,0), pq=fl.reduce((s,h)=>s+h.items.reduce((ss,it)=>ss+it.qty,0),0);
  const opts=months.map(m=>`<option value="${m.val}"${m.val===histMonth?' selected':''}>${m.label}</option>`).join('');
  let body=fl.length===0?'<div class="no-h">해당 월의 발주 내역이 없습니다</div>':'';
  if(fl.length>0){
    const g={};fl.forEach(h=>{const k=fmtD(h.date);if(!g[k])g[k]=[];g[k].push(h);});
    body=Object.entries(g).map(([date,orders])=>{
      const dt=orders.reduce((s,o)=>s+o.total,0);
      return`<div class="og"><div class="ogl">${date} · 합계 ${fmt(dt)}</div>${orders.map(o=>{
        const io=histOpenIds.has(o.id);
        return`<div class="oc"><div class="och" data-to="${o.id}"><div><div class="odt">${new Date(o.date).getHours()}:${pad(new Date(o.date).getMinutes())} 발주</div><div class="oic">${o.items.length}개 품목</div></div><div class="otc">${fmt(o.total)}</div></div><div class="od${io?' open':''}">
          ${o.items.map(it=>`<div class="odr"><div><div>${it.name}</div><div class="odi">${fmt(it.price)}/${it.unit} × ${it.qty}</div></div><div class="ods">${fmt(it.subtotal)}</div></div>`).join('')}
          <button class="odb" data-do="${o.id}">이 발주 삭제</button></div></div>`;
      }).join('')}</div>`;
    }).join('');
  }
  return`<div class="pf-row"><select id="hmSel">${opts}</select><div class="ptbadge">이번달 ${fmt(pt)} / ${pq}개</div></div>
  <div class="summary-strip" style="margin-bottom:16px">
    <div class="scard"><div class="sl">발주 횟수</div><div class="sv">${fl.length}회</div></div>
    <div class="scard"><div class="sl">총 지출</div><div class="sv acc">${fmtS(pt)}</div></div>
    <div class="scard"><div class="sl">총 발주 수량</div><div class="sv">${pq}개</div></div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:14px">
    <button id="addPastBtn" style="flex:1;padding:13px;border-radius:var(--r-lg);border:0.5px dashed var(--border2);background:transparent;font-size:14px;color:var(--text2);cursor:pointer">+ 지난 발주 입력</button>
    <button id="addMonthBtn" style="flex:1;padding:13px;border-radius:var(--r-lg);border:0.5px dashed var(--border2);background:transparent;font-size:14px;color:var(--amber);cursor:pointer">+ 월합계 입력</button>
  </div>
  ${body}`;
}

/* STATS */
function buildStats(){
  const now=new Date();
  let cutoff, cutoffEnd=null;
  if(statsPeriod==='직접선택'){
    cutoff=statsCustomFrom?new Date(statsCustomFrom):new Date(now.getFullYear()-1,now.getMonth(),now.getDate());
    cutoffEnd=statsCustomTo?new Date(statsCustomTo+'T23:59:59'):null;
  } else if(statsPeriod==='1개월')cutoff=new Date(now.getFullYear(),now.getMonth()-1,now.getDate());
  else if(statsPeriod==='3개월')cutoff=new Date(now.getFullYear(),now.getMonth()-3,now.getDate());
  else if(statsPeriod==='6개월')cutoff=new Date(now.getFullYear(),now.getMonth()-6,now.getDate());
  else cutoff=new Date(now.getFullYear()-1,now.getMonth(),now.getDate());
  const fl=history.filter(h=>new Date(h.date)>=cutoff&&(!cutoffEnd||new Date(h.date)<=cutoffEnd));
  const total=fl.reduce((s,h)=>s+h.total,0), tq=fl.reduce((s,h)=>s+h.items.reduce((ss,it)=>ss+it.qty,0),0);

/* PRICE HISTORY TAB */
function buildPrices(){
  const allItems=ingredients;
  const opts=`<option value="all">전체 품목</option>`+allItems.map(i=>`<option value="${i.id}"${phFilter==i.id?' selected':''}>${i.name}</option>`).join('');
  const showItems=phFilter==='all'?allItems:allItems.filter(i=>i.id===+phFilter);
  let totalChanges=0;

  const cards=showItems.map(item=>{
    const ph=priceHist[item.id];
    const log=ph?[...ph.log].reverse():[];
    totalChanges+=log.length;
    const chrono=[...log].reverse();
    const firstPrice=chrono.length>0?chrono[0].oldPrice:item.price;
    const diff=item.price-firstPrice;
    const diffPct=firstPrice>0?((diff/firstPrice)*100).toFixed(1):0;
    const dcls=diff>0?'up':diff<0?'dn':'';
    const dstr=diff>0?`+${diff.toLocaleString()}원 (▲${diffPct}%)`:diff<0?`${diff.toLocaleString()}원 (▼${Math.abs(diffPct)}%)`:'변동 없음';

    let chartSVG='';
    if(chrono.length>=1){
      const pts=[{price:chrono[0].oldPrice,label:'초기'},...chrono.map(l=>({price:l.newPrice,label:fmtDT(l.date).slice(0,5)}))];
      if(pts.length>=2) chartSVG=miniChart(pts);
    }

    const logHtml=log.length===0
      ?`<div style="text-align:center;padding:16px;font-size:13px;color:#999">가격 변동 이력 없음</div>`
      :`<div class="ph-log">
          <div class="ph-log-row hdr"><span>변경일시</span><span>이전</span><span>변경</span><span>변동</span></div>
          ${log.map(l=>{const d=l.newPrice-l.oldPrice;const cl=d>0?'ph-up':d<0?'ph-dn':'ph-eq';const s=d>0?`▲${d.toLocaleString()}`:d<0?`▼${Math.abs(d).toLocaleString()}`:'±0';
            return`<div class="ph-log-row"><span class="ph-dt">${fmtDT(l.date)}</span><span class="ph-old">${l.oldPrice.toLocaleString()}원</span><span class="ph-new">${l.newPrice.toLocaleString()}원</span><span class="${cl}">${s}</span></div>`;
          }).join('')}
        </div>`;

    return`<div class="ph-card">
      <div class="ph-header">
        <div><span class="ph-name">${item.name}</span><span class="ph-badge">${item.cat}</span></div>
        <div><div class="ph-cur-label">현재 단가</div><div class="ph-cur-val">${item.price.toLocaleString()}원/${item.unit}</div></div>
      </div>
      ${(()=>{
      const now3=new Date();
      const cutoff3=new Date(now3.getFullYear(),now3.getMonth()-3,now3.getDate());
      const priceList=[];
      history.forEach(h=>{
        if(new Date(h.date)>=cutoff3){
          h.items.forEach(it=>{if(it.name===item.name)priceList.push(it.price);});
        }
      });
      if(log.length>0){
        [...log].reverse().forEach(l=>{if(new Date(l.date)>=cutoff3)priceList.push(l.newPrice);});
      }
      const avg3=priceList.length>0?Math.round(priceList.reduce((s,p)=>s+p,0)/priceList.length):null;
      return log.length>0||avg3?`<div class="ph-sum-row">
        <div class="ph-pill"><div class="ppl">초기 단가</div><div class="ppv">${firstPrice.toLocaleString()}원</div></div>
        <div class="ph-pill"><div class="ppl">누적 변동</div><div class="ppv ${dcls}">${dstr}</div></div>
        <div class="ph-pill"><div class="ppl">변경 횟수</div><div class="ppv">${log.length}회</div></div>
        <div class="ph-pill"><div class="ppl">3개월 평균</div><div class="ppv">${avg3?avg3.toLocaleString()+'원':'데이터 없음'}</div></div>
      </div>`:''
    })()}
      ${chartSVG?`<div class="ph-chart">${chartSVG}</div>`:''}
      ${logHtml}
    </div>`;
  }).join('')||'<div class="ph-empty">품목이 없습니다</div>';

  return`<div class="ph-filter-row">
    <select id="phSel">${opts}</select>
    <button class="ph-clear-btn" id="phClr">이력 초기화</button>
  </div>
  <div class="summary-strip" style="margin-bottom:16px">
    <div class="scard"><div class="sl">추적 품목 수</div><div class="sv">${Object.keys(priceHist).filter(k=>priceHist[k].log&&priceHist[k].log.length>0).length}개</div></div>
    <div class="scard"><div class="sl">총 변동 횟수</div><div class="sv acc">${totalChanges}회</div></div>
    <div class="scard"><div class="sl">표시 품목</div><div class="sv">${showItems.length}개</div></div>
  </div>
  ${cards}`;
}

function miniChart(pts){
  const W=320,H=90,PL=10,PR=10,PT=18,PB=22;
  const prices=pts.map(p=>p.price);
  const minP=Math.min(...prices),maxP=Math.max(...prices),range=maxP-minP||1;
  const xStep=(W-PL-PR)/(pts.length-1);
  const tx=i=>PL+i*xStep, ty=p=>PT+(H-PT-PB)*(1-(p-minP)/range);
  const path=pts.map((p,i)=>`${i===0?'M':'L'}${tx(i).toFixed(1)},${ty(p.price).toFixed(1)}`).join(' ');
  const dots=pts.map((p,i)=>{const last=i===pts.length-1;return`<circle cx="${tx(i).toFixed(1)}" cy="${ty(p.price).toFixed(1)}" r="${last?4.5:3}" fill="${last?'#D4820A':'#1C1A17'}"/>`;}).join('');
  const labels=pts.map((p,i)=>{
    if(i===0||i===pts.length-1||pts.length<=5){
      const yv=ty(p.price); const last=i===pts.length-1;
      return`<text x="${tx(i).toFixed(1)}" y="${(H-4).toFixed(1)}" text-anchor="middle" font-size="10" fill="#999">${pts[i].label}</text>
             <text x="${tx(i).toFixed(1)}" y="${(yv-7).toFixed(1)}" text-anchor="middle" font-size="10" fill="${last?'#D4820A':'#555'}" font-weight="${last?'600':'400'}">${p.price.toLocaleString()}</text>`;
    } return '';
  }).join('');
  return`<svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block;overflow:visible">
    <path d="${path}" fill="none" stroke="#1C1A17" stroke-width="1.5" stroke-linejoin="round"/>
    ${dots}${labels}
  </svg>`;
}

function confOrder(){
  const items=ingredients.filter(i=>i.qty>0).map(i=>({name:i.name,cat:i.cat,unit:i.unit,price:i.price,qty:i.qty,subtotal:i.price*i.qty}));
  if(!items.length)return;
  const total=items.reduce((s,it)=>s+it.subtotal,0);
  const now=new Date();
  const todayVal=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  const todayTime=`${pad(now.getHours())}:${pad(now.getMinutes())}`;

  // 카테고리별로 묶어서 SMS 버튼 목록 생성
  const catMap={};
  items.forEach(it=>{if(!catMap[it.cat])catMap[it.cat]=[];catMap[it.cat].push(it);});
  const cats=Object.keys(catMap);

  // STEP 1: 확정 전 확인 (날짜/공병만)
  document.getElementById('overlay').innerHTML=`<div class="mbg"><div class="mbox">
    <h3>발주 확정</h3>
    <div style="background:var(--bg3);border-radius:var(--r-md);padding:12px 14px;margin-bottom:14px;font-size:13px;color:var(--text2)">
      ${items.length}개 품목 · 총 <span style="color:var(--amber);font-weight:500">${fmt(total)}</span>
    </div>
    <div class="mf">
      <label>발주 날짜</label>
      <input type="date" id="confDate" value="${todayVal}" max="${todayVal}">
    </div>
    <div class="mf">
      <label>공병 환급액 (없으면 0)</label>
      <input type="number" id="confRefund" value="0" inputmode="numeric" placeholder="0">
    </div>
    <div class="mbtns">
      <button class="mbcn" id="confCancel">취소</button>
      <button class="mbok" id="confOk">확정 →</button>
    </div>
  </div></div>`;

  document.getElementById('confCancel').addEventListener('click',()=>{document.getElementById('overlay').innerHTML='';});

  document.getElementById('confOk').addEventListener('click',()=>{
    const dateVal=document.getElementById('confDate').value;
    const refund=parseInt(document.getElementById('confRefund')?.value)||0;
    if(!dateVal){alert('날짜를 선택해주세요');return;}
    const finalDate=new Date(`${dateVal}T${todayTime}:00`);
    const netTotal=total-refund;
    const orderId=String(Date.now());
    history.unshift({id:orderId,date:finalDate.toISOString(),items,total,refund,netTotal});
    history.sort((a,b)=>new Date(b.date)-new Date(a.date));
    const deliveryItems=items.map(it=>({name:it.name,cat:it.cat,unit:it.unit,qty:it.qty,actualPrice:null}));
    deliveryList.unshift({orderId,orderDate:finalDate.toISOString(),items:deliveryItems,confirmed:false});
    saveDelivery();
    ingredients.forEach(i=>{if(i._origPrice&&i._origPrice!==i.price){recordPrice(i,i._origPrice,i.price);}i._origPrice=null;i.qty=0;i.priceChanged=false;});
    saveHist();saveIng();savePH();updateTopbar();
    render();
    setSyncStatus('⟳ 저장 중...','#F5A623');
    syncToSheets().then(ok=>setSyncStatus(ok?'☁ 저장 완료':'✕ 저장 실패',ok?'#1D9E75':'#E24B4A'));
    setTimeout(()=>setSyncStatus('☁ 동기화','#888'),4000);

    // STEP 2: 저장 완료 후 바로 발송 화면
    const fullText=buildOrderTextFull(items,total,refund,dateVal,todayTime);
    // 클립보드 자동 복사 시도
    try{navigator.clipboard.writeText(fullText).catch(()=>{});}catch{}

    document.getElementById('overlay').innerHTML=`<div class="mbg" style="align-items:flex-end;padding:0"><div style="background:var(--bg2);border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;border-top:0.5px solid var(--border2)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div style="font-size:16px;font-weight:500;color:var(--text)">✅ 발주 확정 완료</div>
        <button id="shareClose" style="font-size:22px;color:var(--text2);background:none;border:none;cursor:pointer;line-height:1;padding:4px">✕</button>
      </div>
      <div style="font-size:12px;color:#1D9E75;margin-bottom:16px">내용이 클립보드에 복사됐어요</div>
      <div style="font-size:12px;font-weight:500;color:var(--text2);margin-bottom:8px">카테고리별 문자 발송</div>
      ${cats.map(cat=>{
        const phone=catPhones[cat]||'';
        const catItems=catMap[cat]||[];
        const smsText=buildSmsText(catItems);
        const smsHref=phone?`sms:${phone}?body=${encodeURIComponent(smsText)}`:`sms:?body=${encodeURIComponent(smsText)}`;
        return`<a href="${smsHref}" style="display:flex;justify-content:space-between;align-items:center;width:100%;margin-bottom:8px;padding:13px 16px;border-radius:var(--r-lg);border:0.5px solid var(--border2);background:${phone?'#1C1A17':'var(--bg3)'};text-decoration:none">
          <span style="font-size:14px;font-weight:500;color:${phone?'#F5EDD8':'var(--text2)'}">📱 ${cat}</span>
          <span style="font-size:12px;color:${phone?'#F5A623':'#E24B4A'}">${phone||'번호 미등록'}</span>
        </a>`;
      }).join('')}
      <button id="shareCopyAll" style="width:100%;margin-top:4px;padding:13px;border-radius:var(--r-lg);border:0.5px solid var(--border2);background:var(--bg3);font-size:14px;cursor:pointer;color:var(--text2)">📋 전체 내용 다시 복사</button>
    </div></div>`;

    document.getElementById('shareClose').addEventListener('click',()=>{document.getElementById('overlay').innerHTML='';});
    document.getElementById('shareCopyAll').addEventListener('click',()=>{
      try{
        navigator.clipboard.writeText(fullText).then(()=>{
          const btn=document.getElementById('shareCopyAll');
          if(btn){btn.textContent='✓ 복사됨!';setTimeout(()=>{btn.textContent='📋 전체 내용 다시 복사';},1500);}
        });
      }catch{
        const ta=document.createElement('textarea');
        ta.value=fullText;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
        const btn=document.getElementById('shareCopyAll');
        if(btn){btn.textContent='✓ 복사됨!';setTimeout(()=>{btn.textContent='📋 전체 내용 다시 복사';},1500);}
      }
    });
  });
}

// 카테고리별 SMS 문자 형식 (업체 발주 스타일)
function buildSmsText(catItems){
  const {storeName, greeting, closing} = appSettings;
  let text=`${greeting} ${storeName} 입니다\n`;
  catItems.forEach(it=>{
    const q=it.qty%1===0?it.qty:it.qty.toFixed(2).replace(/\.?0+$/,'');
    text+=`${it.name} ${q}\n`;
  });
  text+=closing;
  return text;
}

// 전체 복사용 (카테고리별 묶음)
function buildOrderTextFull(items,total,refund,dateVal,timeVal){
  const catMap={};
  items.forEach(it=>{if(!catMap[it.cat])catMap[it.cat]=[];catMap[it.cat].push(it);});
  let text=`[발주] ${dateVal} ${timeVal}\n\n`;
  Object.entries(catMap).forEach(([cat,its])=>{
    text+=`▶ ${cat}\n`;
    its.forEach(it=>{
      const q=it.qty%1===0?it.qty:it.qty.toFixed(2).replace(/\.?0+$/,'');
      text+=`  ${it.name} ${q}${it.unit}\n`;
    });
    text+='\n';
  });
  text+=`───────────────\n`;
  text+=`총 발주금액 ${Number(total).toLocaleString('ko-KR')}원`;
  if(refund>0){
    text+=`\n공병환급 -${Number(refund).toLocaleString('ko-KR')}원`;
    text+=`\n실지출 ${Number(total-refund).toLocaleString('ko-KR')}원`;
  }
  return text;
}

async function shareOrder(text){
  const isSecure=location.protocol==='https:';
  const isMobile=/Android|iPhone|iPad/i.test(navigator.userAgent);
  if(isSecure&&isMobile&&navigator.share){
    try{await navigator.share({text});return;}
    catch(e){if(e.name==='AbortError')return;}
  }
  showSharePopup(text);
}

  const ov=document.getElementById('overlay');
  ov.innerHTML=`<div class="mbg"><div class="mbox">

      <button id="shareClose" style="padding:12px 16px;border-radius:var(--r-md);border:0.5px solid var(--border2);background:transparent;font-size:14px;cursor:pointer;color:var(--text2)">닫기</button>

  document.getElementById('shareClose').addEventListener('click',()=>{ov.innerHTML='';});

    <div class="mf">
      <label>상호명</label>
      <input id="setStoreName" value="${appSettings.storeName}" placeholder="예: 범방동영진돼지국밥">
    </div>
    <div class="mf">
      <label>인사말</label>
      <input id="setGreeting" value="${appSettings.greeting}" placeholder="예: 안녕하세요">
    </div>
    <div class="mf">
      <label>마무리 문구</label>
      <textarea id="setClosing" style="width:100%;padding:10px 12px;border-radius:var(--r-md);border:0.5px solid var(--border2);font-size:14px;color:var(--text);background:var(--bg2);resize:none;height:80px;font-family:inherit">${appSettings.closing}</textarea>
    </div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:8px;background:var(--bg3);padding:10px 12px;border-radius:var(--r-md)">
      미리보기:<br>
      <span id="previewText" style="white-space:pre-wrap;font-size:12px;color:var(--text)"></span>
    </div>
    <div class="mbtns">
      <button class="mbcn" id="settingsCancel">취소</button>
      <button class="mbok" id="settingsSave">저장</button>
    </div>
  </div></div>`;
  function updatePreview(){
    const sn=document.getElementById('setStoreName').value||'상호명';
    const gr=document.getElementById('setGreeting').value||'안녕하세요';
    const cl=document.getElementById('setClosing').value;
    document.getElementById('previewText').textContent=`${gr} ${sn} 입니다\n품목1 40\n품목2 20\n${cl}`;
  }
  updatePreview();
  document.getElementById('setStoreName').addEventListener('input',updatePreview);
  document.getElementById('setGreeting').addEventListener('input',updatePreview);
  document.getElementById('setClosing').addEventListener('input',updatePreview);
  document.getElementById('settingsCancel').addEventListener('click',()=>{document.getElementById('overlay').innerHTML='';showCatModal();});
  document.getElementById('settingsSave').addEventListener('click',()=>{
    appSettings.storeName=document.getElementById('setStoreName').value.trim()||'범방동영진돼지국밥';
    appSettings.greeting=document.getElementById('setGreeting').value.trim()||'안녕하세요';
    appSettings.closing=document.getElementById('setClosing').value;
    saveSettings();
    document.getElementById('overlay').innerHTML='';
    alert('저장 완료!');
  });
}

function showPastOrderModal(){
  const now=new Date();
  const todayVal=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  let pastRows=[];
  function renderPastRows(container){
    container.innerHTML=pastRows.map((r,i)=>`
      <div style="display:grid;grid-template-columns:1fr 0.7fr 0.6fr 0.5fr auto;gap:6px;align-items:center;margin-bottom:8px">
        <select data-pr-cat="${i}" style="padding:8px;border-radius:var(--r-md);border:0.5px solid var(--border2);font-size:13px;background:var(--bg2);color:var(--text)">
          ${getCatsOnly().map(c=>`<option${r.cat===c?' selected':''}>${c}</option>`).join('')}
        </select>
        <input data-pr-name="${i}" value="${r.name}" placeholder="품목명" style="padding:8px;border-radius:var(--r-md);border:0.5px solid var(--border2);font-size:13px;color:var(--text);background:var(--bg2)">
        <input data-pr-price="${i}" type="number" value="${r.price}" placeholder="단가" style="padding:8px;border-radius:var(--r-md);border:0.5px solid var(--border2);font-size:13px;color:var(--text);background:var(--bg2)">
        <input data-pr-qty="${i}" type="number" value="${r.qty}" placeholder="수량" style="padding:8px;border-radius:var(--r-md);border:0.5px solid var(--border2);font-size:13px;color:var(--text);background:var(--bg2)">
        <button data-pr-del="${i}" style="padding:6px 8px;border-radius:6px;border:0.5px solid #f09595;background:transparent;color:#a32d2d;cursor:pointer;font-size:13px">✕</button>
      </div>`).join('');
    container.querySelectorAll('[data-pr-cat]').forEach(el=>el.addEventListener('change',()=>{pastRows[+el.dataset.prCat].cat=el.value;}));
    container.querySelectorAll('[data-pr-name]').forEach(el=>el.addEventListener('input',()=>{pastRows[+el.dataset.prName].name=el.value;}));
    container.querySelectorAll('[data-pr-price]').forEach(el=>el.addEventListener('input',()=>{pastRows[+el.dataset.prPrice].price=parseInt(el.value)||0;}));
    container.querySelectorAll('[data-pr-qty]').forEach(el=>el.addEventListener('input',()=>{pastRows[+el.dataset.prQty].qty=parseInt(el.value)||0;}));
    container.querySelectorAll('[data-pr-del]').forEach(el=>el.addEventListener('click',()=>{pastRows.splice(+el.dataset.prDel,1);renderPastRows(container);}));
  }
  pastRows=ingredients.map(i=>({name:i.name,cat:i.cat,unit:i.unit,price:i.price,qty:0}));

  document.getElementById('overlay').innerHTML=`<div class="mbg" style="align-items:flex-start;padding-top:20px"><div class="mbox" style="max-height:90vh;overflow-y:auto">
    <h3>지난 발주 입력</h3>
    <div class="mf">
      <label>발주 날짜</label>
      <input type="date" id="pastDate" value="${todayVal}" max="${todayVal}">
    </div>
    <div class="mf">
      <label>발주 시간</label>
      <input type="time" id="pastTime" value="09:00">
    </div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:10px">수량 0인 항목은 자동 제외돼요</div>
    <div style="display:grid;grid-template-columns:1fr 0.7fr 0.6fr 0.5fr auto;gap:6px;margin-bottom:6px">
      <span style="font-size:11px;color:var(--text2)">카테고리</span>
      <span style="font-size:11px;color:var(--text2)">품목명</span>
      <span style="font-size:11px;color:var(--text2)">단가</span>
      <span style="font-size:11px;color:var(--text2)">수량</span>
      <span></span>
    </div>
    <div id="pastRowsContainer"></div>
    <button id="addPastRow" style="width:100%;padding:10px;border-radius:var(--r-md);border:0.5px dashed var(--border2);background:transparent;font-size:13px;color:var(--text2);cursor:pointer;margin-bottom:14px;margin-top:4px">+ 품목 추가</button>
    <div class="mbtns">
      <button class="mbcn" id="pastCancel">취소</button>
      <button class="mbok" id="pastOk">저장</button>
    </div>
  </div></div>`;

  const container=document.getElementById('pastRowsContainer');
  renderPastRows(container);
  document.getElementById('addPastRow').addEventListener('click',()=>{
    pastRows.push({name:'',cat:getCatsOnly()[0]||'기타',unit:'개',price:0,qty:0});
    renderPastRows(container);
  });
  document.getElementById('pastCancel').addEventListener('click',()=>{document.getElementById('overlay').innerHTML='';});
  document.getElementById('pastOk').addEventListener('click',()=>{
    const dateVal=document.getElementById('pastDate').value;
    const timeVal=document.getElementById('pastTime').value||'09:00';
    if(!dateVal){alert('날짜를 선택해주세요');return;}
    const items=pastRows.filter(r=>r.qty>0&&r.name.trim()).map(r=>({
      name:r.name.trim(),cat:r.cat,unit:r.unit||'개',price:r.price,qty:r.qty,subtotal:r.price*r.qty
    }));
    if(!items.length){alert('수량이 입력된 품목이 없어요');return;}
    const total=items.reduce((s,it)=>s+it.subtotal,0);
    const finalDate=new Date(`${dateVal}T${timeVal}:00`);
    history.push({id:String(Date.now()),date:finalDate.toISOString(),items,total});
    history.sort((a,b)=>new Date(b.date)-new Date(a.date));
    histMonth=`${finalDate.getFullYear()}-${pad(finalDate.getMonth()+1)}`;
    saveHist();updateTopbar();
    document.getElementById('overlay').innerHTML='';
    alert(`지난 발주 저장 완료!\n${dateVal} ${timeVal}\n총 ${fmt(total)} / ${items.length}개 품목`);
    curTab='history';render();
  });
}

function showMonthSummaryModal(){
  const now=new Date();
  const months=[];
  for(let i=1;i<=24;i++){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    months.push({val:`${d.getFullYear()}-${pad(d.getMonth()+1)}`,label:`${d.getFullYear()}년 ${d.getMonth()+1}월`});
  }
  const cats=getCatsOnly();

  document.getElementById('overlay').innerHTML=`<div class="mbg" style="align-items:flex-start;padding-top:20px"><div class="mbox" style="max-height:92vh;overflow-y:auto">
    <h3>월합계 입력</h3>
    <div style="font-size:12px;color:var(--text2);margin-bottom:14px">카테고리별 금액을 입력해요. 0이면 제외돼요.</div>
    <div class="mf">
      <label>월 선택</label>
      <select id="monthSel">${months.map(m=>`<option value="${m.val}">${m.label}</option>`).join('')}</select>
    </div>
    <div style="margin-bottom:14px">
      ${cats.map(cat=>`
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="font-size:14px;font-weight:500;color:var(--text);width:80px;flex-shrink:0">${cat}</span>
          <input data-cat-amt="${cat}" type="number" inputmode="numeric" placeholder="0" style="flex:1;padding:9px 12px;border-radius:var(--r-md);border:0.5px solid var(--border2);font-size:15px;color:var(--text);background:var(--bg2)">
          <span style="font-size:13px;color:var(--text2);flex-shrink:0">원</span>
        </div>`).join('')}
    </div>
    <div id="monthTotal" style="padding:10px 14px;background:var(--amber-bg);border-radius:var(--r-md);font-size:14px;font-weight:500;color:var(--amber);margin-bottom:14px">합계: 0원</div>
    <div class="mbtns">
      <button class="mbcn" id="monthCancel">취소</button>
      <button class="mbok" id="monthOk">저장</button>
    </div>
  </div></div>`;

  // 합계 실시간 업데이트
  document.querySelectorAll('[data-cat-amt]').forEach(inp=>inp.addEventListener('input',()=>{
    const total=cats.reduce((s,cat)=>{
      const el=document.querySelector(`[data-cat-amt="${cat}"]`);
      return s+(parseInt(el?.value)||0);
    },0);
    document.getElementById('monthTotal').textContent=`합계: ${total.toLocaleString()}원`;
  }));

  document.getElementById('monthCancel').addEventListener('click',()=>{document.getElementById('overlay').innerHTML='';});
  document.getElementById('monthOk').addEventListener('click',()=>{
    const monthVal=document.getElementById('monthSel').value;
    const [y,m]=monthVal.split('-');
    const date=new Date(`${y}-${m}-01T09:00:00`);
    const items=[];
    let total=0;
    cats.forEach(cat=>{
      const el=document.querySelector(`[data-cat-amt="${cat}"]`);
      const amt=parseInt(el?.value)||0;
      if(amt>0){
        items.push({name:`${cat} 합계`,cat,unit:'월',price:amt,qty:1,subtotal:amt});
        total+=amt;
      }
    });
    if(!items.length){alert('금액을 입력해주세요');return;}
    history.push({
      id:String(Date.now()),
      date:date.toISOString(),
      items,
      total,
      isMonthlySummary:true
    });
    history.sort((a,b)=>new Date(b.date)-new Date(a.date));
    histMonth=monthVal;
    saveHist();updateTopbar();
    document.getElementById('overlay').innerHTML='';
    setSyncStatus('⟳ 저장 중...','#F5A623');
    syncToSheets().then(ok=>setSyncStatus(ok?'☁ 저장 완료':'✕ 저장 실패',ok?'#1D9E75':'#E24B4A'));
    setTimeout(()=>setSyncStatus('☁ 동기화','#888'),4000);
    curTab='history';render();
  });
}

load();
</script>
</body>
</html>
